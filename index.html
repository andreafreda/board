<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Board Lite v10</title>
<style>
:root{
  --bg:#f6f4ee;--board:#fffaf0;--grid:rgba(31,35,40,.06);
  --text:#1f2328;--muted:#70757d;--border:rgba(31,35,40,.12);
  --surface:rgba(255,255,255,.95);--shadow:0 12px 28px rgba(31,35,40,.13);
  --ssoft:0 4px 12px rgba(31,35,40,.07);--primary:#0f6f76;--danger:#d94848;
}
[data-theme="dark"]{
  --bg:#111315;--board:#23262b;--grid:rgba(255,255,255,.07);
  --text:#eef2f7;--muted:#a9b1bb;--border:rgba(255,255,255,.12);
  --surface:rgba(30,32,36,.97);--shadow:0 14px 34px rgba(0,0,0,.35);
  --ssoft:0 4px 12px rgba(0,0,0,.22);--primary:#66c2c8;--danger:#ff7c7c;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
button,textarea,input{font:inherit;color:inherit;border:none;background:none;cursor:pointer;}
:focus-visible{outline:2px solid var(--primary);outline-offset:2px;}

/* Viewport */
#viewport{position:fixed;inset:0;overflow:hidden;background:var(--bg);}

/* Board — dimensione fissa, navigabile via pan */
#board{
  position:absolute;top:0;left:0;
  width:1366px;height:768px;
  background:
    linear-gradient(to right,var(--grid) 1px,transparent 1px),
    linear-gradient(to bottom,var(--grid) 1px,transparent 1px),
    var(--board);
  background-size:34px 34px,34px 34px,auto;
  transform-origin:0 0;
  touch-action:none;user-select:none;
}

/* Auth — dentro il drawer */
.auth-drawer-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.auth-google-btn{
  display:flex;align-items:center;justify-content:center;
  width:42px;height:42px;border-radius:13px;
  border:1px solid var(--border);background:var(--surface);
  box-shadow:var(--ssoft);flex-shrink:0;
}
.auth-google-btn:hover{background:color-mix(in srgb,var(--primary) 6%,var(--surface));}
.auth-avatar{
  width:32px;height:32px;border-radius:999px;
  background:var(--primary);color:#fff;
  display:grid;place-items:center;
  font-size:.8rem;font-weight:700;flex-shrink:0;overflow:hidden;
}
.auth-logout-btn{
  width:42px;height:42px;border-radius:13px;
  display:grid;place-items:center;font-size:1rem;
  border:1px solid var(--border);background:var(--surface);
  flex-shrink:0;opacity:.7;transition:opacity .15s;
}
.auth-logout-btn:hover{opacity:1;color:var(--danger);}
.auth-spinner{
  width:16px;height:16px;border-radius:999px;
  border:2px solid var(--border);border-top-color:var(--primary);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Clock */
.clock{position:fixed;top:10px;left:10px;z-index:30;
  padding:.28rem .6rem;border-radius:11px;background:var(--surface);
  border:1px solid var(--border);box-shadow:var(--ssoft);
  user-select:none;backdrop-filter:blur(10px);line-height:1.3;}
.clock .tl{font-size:.8rem;font-weight:700;}
.clock .dl{font-size:.66rem;opacity:.65;}
.clock.hidden{display:none;}

/* Corner */
.corner{position:fixed;top:10px;right:10px;z-index:40;display:flex;gap:6px;}
.cbtn{width:44px;height:44px;border-radius:14px;border:1px solid var(--border);
  background:var(--surface);box-shadow:var(--ssoft);
  display:grid;place-items:center;font-size:1.05rem;font-weight:700;
  backdrop-filter:blur(10px);}
.cbtn.on{background:color-mix(in srgb,var(--primary) 16%,var(--surface));
  border-color:color-mix(in srgb,var(--primary) 45%,transparent);
  box-shadow:0 0 0 2px color-mix(in srgb,var(--primary) 20%,transparent),var(--ssoft);}

/* Drawer */
.drawer{position:fixed;top:62px;right:10px;z-index:45;
  width:min(300px,calc(100vw - 20px));
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;box-shadow:var(--shadow);padding:.6rem;
  display:none;backdrop-filter:blur(18px);
  max-height:calc(100dvh - 80px);overflow-y:auto;}
.drawer.open{display:block;}
.dsec{padding:.38rem 0;border-bottom:1px solid var(--border);display:grid;gap:.4rem;}
.dsec:last-child{border-bottom:0;}
.dlabel{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
.sw{display:flex;align-items:center;justify-content:space-between;}
.sw span{font-size:.86rem;}
.sw input[type=checkbox]{width:17px;height:17px;accent-color:var(--primary);}
.drow{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.dbtn{min-height:42px;border-radius:13px;border:1px solid var(--border);
  background:var(--surface);font-size:.84rem;}
.dbtn.danger{color:var(--danger);}
.dbtn.full{grid-column:1/-1;}
.preset-row{display:flex;flex-wrap:wrap;gap:5px;}
.preset-btn{padding:.3rem .6rem;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);font-size:.76rem;font-weight:600;}
.preset-btn.active{background:var(--primary);color:#fff;border-color:transparent;}
.size-inputs{display:grid;grid-template-columns:1fr auto 1fr;gap:5px;align-items:center;}
.size-inputs input[type=number]{width:100%;min-height:36px;border-radius:9px;
  border:1px solid var(--border);background:var(--surface);padding:0 6px;
  font-size:.84rem;text-align:center;}
.size-inputs span{font-size:.8rem;text-align:center;color:var(--muted);}

/* Toolbars */
.toolbar{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);
  z-index:50;display:none;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:999px;padding:8px 14px;
  box-shadow:var(--shadow);backdrop-filter:blur(16px);
  white-space:nowrap;height:52px;overflow:visible;}
.toolbar.visible{display:flex;}
.tb-sep{width:1px;height:24px;background:var(--border);margin:0 2px;align-self:center;}
.tb-btn{width:36px;height:36px;border-radius:999px;border:2px solid transparent;
  display:grid;place-items:center;font-size:.9rem;align-self:center;}
.tb-btn.active{border-color:var(--primary);
  background:color-mix(in srgb,var(--primary) 14%,transparent);}
.tb-dot{border-radius:999px;border:2px solid transparent;flex:0 0 auto;cursor:pointer;align-self:center;}
.tb-dot.active{border-color:var(--text);}

/* Vertical slider */
.vslider-wrap{position:relative;display:flex;flex-direction:column;align-items:center;
  gap:4px;cursor:ns-resize;user-select:none;touch-action:none;
  margin-top:-90px;background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:6px 8px 4px;box-shadow:var(--ssoft);}
.vslider-track{width:8px;height:72px;
  background:color-mix(in srgb,var(--border) 80%,transparent);
  border-radius:999px;position:relative;}
.vslider-fill{position:absolute;bottom:0;left:0;right:0;border-radius:999px;background:var(--primary);}
.vslider-thumb{position:absolute;left:50%;transform:translate(-50%,-50%);
  width:20px;height:20px;border-radius:999px;
  background:var(--surface);border:2px solid var(--primary);
  box-shadow:0 2px 8px rgba(0,0,0,.18);}
.vslider-val{font-size:.65rem;font-weight:700;color:var(--primary);}
.vslider-preview{width:32px;height:32px;border-radius:999px;
  display:flex;align-items:center;justify-content:center;}

/* Fullscreen */
.fab-fs{position:fixed;bottom:10px;right:10px;z-index:41;
  width:42px;height:42px;border-radius:13px;background:var(--surface);
  border:1px solid var(--border);box-shadow:var(--ssoft);
  display:grid;place-items:center;font-size:1.1rem;backdrop-filter:blur(10px);}



/* Confirm popup */
.confirm-pop{position:fixed;z-index:60;background:var(--surface);
  border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);
  padding:.8rem 1rem;display:none;flex-direction:column;gap:.6rem;
  min-width:200px;backdrop-filter:blur(16px);animation:popIn .15s ease;}
.confirm-pop.open{display:flex;}
@keyframes popIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.confirm-pop p{margin:0;font-size:.88rem;font-weight:600;}
.confirm-pop .pop-row{display:flex;gap:8px;}
.confirm-pop .pop-btn{flex:1;min-height:38px;border-radius:11px;
  border:1px solid var(--border);background:var(--surface);font-size:.84rem;font-weight:600;}
.confirm-pop .pop-btn.danger{background:var(--danger);color:#fff;border-color:transparent;}

/* Pan indicator */
.pan-ind{position:fixed;bottom:10px;left:10px;z-index:35;
  font-size:.65rem;color:var(--muted);opacity:0;transition:opacity .4s;
  background:color-mix(in srgb,var(--surface) 88%,transparent);
  border:1px solid var(--border);border-radius:999px;padding:.2rem .5rem;
  pointer-events:none;}
.pan-ind.show{opacity:1;}

/* Notes layer — pointer-events:none, le singole .note:auto */
.notes-layer{position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;}
.note{pointer-events:auto;}

/* Draw layer */
.draw-layer{position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;z-index:1;background:transparent;}
.draw-layer.on{pointer-events:auto;cursor:crosshair;}
.draw-layer.eraser-on{cursor:cell;}

/* Note */
.note{position:absolute;border-radius:15px 15px 18px 15px;
  box-shadow:0 10px 22px rgba(0,0,0,.13);border:1px solid rgba(0,0,0,.08);
  padding:1.1rem .75rem .6rem;display:flex;flex-direction:column;
  transform:rotate(var(--rot,0deg));min-width:120px;min-height:100px;}
.note::before{content:'';position:absolute;top:9px;left:12px;width:36px;height:7px;
  border-radius:999px;background:rgba(255,255,255,.68);}
.note.text-active{box-shadow:0 0 0 2.5px var(--primary),0 10px 22px rgba(0,0,0,.13);}
/* Head: z-index:5 per stare SOPRA il note-canvas (z-index:4) */
.note-head{position:absolute;inset:0 0 auto 0;height:34px;z-index:5;
  display:flex;align-items:center;justify-content:flex-end;
  padding:5px 7px 0 0;gap:5px;cursor:grab;}
.note.dragging .note-head{cursor:grabbing;}
.mini-btn{width:28px;height:28px;border-radius:999px;
  background:rgba(255,255,255,.82);box-shadow:0 1px 5px rgba(0,0,0,.08);
  display:grid;place-items:center;color:#4b5563;font-size:.95rem;}
.note textarea{width:100%;flex:1;border:0;outline:0;background:transparent;
  resize:none;padding-top:.3rem;line-height:1.4;pointer-events:none;}
.note textarea.editable{pointer-events:auto;}
.resize-handle{position:absolute;right:0;bottom:0;width:22px;height:22px;
  cursor:se-resize;z-index:5;display:flex;align-items:flex-end;
  justify-content:flex-end;padding:4px;}
.resize-handle::after{content:'';display:block;width:10px;height:10px;
  border-right:2px solid rgba(0,0,0,.22);border-bottom:2px solid rgba(0,0,0,.22);
  border-radius:0 0 4px 0;}
/* Canvas del post-it: parte da 34px per lasciare la head libera */
.note-canvas{position:absolute;top:34px;left:0;right:0;bottom:0;
  width:100%;height:calc(100% - 34px);
  pointer-events:none;border-radius:0 0 inherit inherit;z-index:4;}
.note-canvas.draw-on{pointer-events:auto;cursor:crosshair;}
.note-canvas.eraser-on{pointer-events:auto;cursor:cell;}
</style>
</head>
<body>

<div id="viewport">
  <div id="board">
    <canvas class="draw-layer" id="sketch"></canvas>
    <div class="notes-layer" id="notesLayer"></div>
  </div>
</div>

<div class="clock hidden" id="clock">
  <div class="tl" id="timeLine">--:--</div>
  <div class="dl" id="dateLine"></div>
</div>

<div class="corner">
  <button class="cbtn" id="textModeBtn" title="Testo" type="button">T</button>
  <button class="cbtn" id="drawModeBtn" title="Lavagna" type="button">✏️</button>
  <button class="cbtn" id="noteModeBtn" title="Post-it" type="button">🗒️</button>
  <button class="cbtn" id="hamburger" type="button">☰</button>
</div>

<div class="drawer" id="drawer">
  <!-- Auth section -->
  <div class="dsec" id="authDrawerSec">
    <!-- guest -->
    <div class="auth-drawer-row" id="authGuestRow">
      <button class="auth-google-btn" id="googleBtn" type="button" title="Accedi con Google">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
      </button>
    </div>
    <!-- logged in -->
    <div class="auth-drawer-row" id="authUserRow" style="display:none;">
      <div class="auth-avatar" id="authAvatar"></div>
      <button class="auth-logout-btn" id="authLogoutBtn" type="button" title="Logout">↩</button>
    </div>
  </div>
  <div class="dsec" style="flex-direction:row;align-items:center;gap:8px;">
    <button class="dbtn" id="clockToggleBtn" type="button" title="Mostra/nascondi orologio"
      style="min-height:42px;width:42px;padding:0;display:grid;place-items:center;font-size:1.25rem;">🕐</button>
  </div>
  <div class="dsec">
    <div class="preset-row" id="presetRow"></div>
    <div class="size-inputs">
      <input type="number" id="boardW" min="400" max="4000" step="1"/>
      <span>×</span>
      <input type="number" id="boardH" min="300" max="3000" step="1"/>
    </div>
    <div style="display:flex;gap:6px;">
      <button class="dbtn" id="applySize" type="button" title="Applica dimensioni" style="flex:1;font-size:1.2rem;">✅</button>
      <button class="dbtn" id="centerBoard" type="button" title="Centra board" style="flex:1;font-size:1.2rem;">⊞</button>
    </div>
  </div>
  <div class="dsec">
    <div style="display:flex;gap:6px;">
      <button class="dbtn" id="clearSketch" type="button" title="Cancella disegno" style="flex:1;font-size:1.2rem;">🧹</button>
      <button class="dbtn danger" id="resetBtn" type="button" title="Reset board" style="flex:1;font-size:1.2rem;">🗑️</button>
    </div>
  </div>
  <div class="dsec">
    <div style="display:flex;gap:6px;">
      <button class="dbtn" id="exportBtn" type="button" title="Esporta board" style="flex:1;font-size:1.2rem;">📤</button>
      <label class="dbtn" id="importLabel" title="Importa board" style="flex:1;font-size:1.2rem;display:grid;place-items:center;cursor:pointer;">📥
        <input type="file" id="importFile" accept=".json" style="display:none;"/>
      </label>
    </div>
  </div>
</div>

<!-- Note toolbar -->
<div class="toolbar" id="noteToolbar">
  <div id="noteColors" style="display:flex;gap:6px;align-items:center;"></div>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="addNoteBtn" type="button"
    style="background:var(--primary);color:#fff;border-radius:12px;font-size:1.2rem;border:none;">＋</button>
</div>

<!-- Draw toolbar -->
<div class="toolbar" id="drawToolbar">
  <button class="tb-btn active" id="penBtn" type="button">✏️</button>
  <button class="tb-btn" id="eraserBtn" type="button">🧹</button>
  <div class="tb-sep"></div>
  <div id="penColors" style="display:flex;gap:5px;align-items:center;"></div>
  <div class="tb-sep" id="drawSep2"></div>
  <div class="vslider-wrap" id="drawSliderWrap">
    <div class="vslider-val" id="drawSliderVal">7</div>
    <div class="vslider-track" id="drawSliderTrack">
      <div class="vslider-fill" id="drawSliderFill"></div>
      <div class="vslider-thumb" id="drawSliderThumb"></div>
    </div>
    <div class="vslider-preview" id="drawSliderPreview"></div>
  </div>
</div>

<!-- Text toolbar -->
<div class="toolbar" id="textToolbar">
  <div id="txtColors" style="display:flex;gap:5px;align-items:center;"></div>
  <div class="tb-sep"></div>
  <div class="vslider-wrap" id="txtSliderWrap">
    <div class="vslider-val" id="txtSliderVal">15</div>
    <div class="vslider-track" id="txtSliderTrack">
      <div class="vslider-fill" id="txtSliderFill"></div>
      <div class="vslider-thumb" id="txtSliderThumb"></div>
    </div>
    <div class="vslider-preview" id="txtSliderPreview"
      style="font-weight:700;color:var(--primary);font-size:14px;">A</div>
  </div>
</div>

<button class="fab-fs" id="fullBtn" type="button">⛶</button>
<div class="pan-ind" id="panInd"></div>

<div class="confirm-pop" id="confirmPop">
  <p>Eliminare il post-it?</p>
  <div class="pop-row">
    <button class="pop-btn" id="confirmNo" type="button">Annulla</button>
    <button class="pop-btn danger" id="confirmYes" type="button">Elimina</button>
  </div>
</div>

<script>
(()=>{
'use strict';
const $=id=>document.getElementById(id);

const viewport=$('viewport'), board=$('board');
const sketch=$('sketch'), ctx=sketch.getContext('2d');
const notesLayer=$('notesLayer');
const drawer=$('drawer'), hamburger=$('hamburger');
const clockEl=$('clock'), timeLine=$('timeLine'), dateLine=$('dateLine');
const clockToggle=$('clockToggle');
const drawToolbar=$('drawToolbar'), textToolbar=$('textToolbar'), noteToolbar=$('noteToolbar');
const textModeBtn=$('textModeBtn'), drawModeBtn=$('drawModeBtn');
const noteModeBtn=$('noteModeBtn'), addNoteBtn=$('addNoteBtn');
const penBtn=$('penBtn'), eraserBtn=$('eraserBtn');
const confirmPop=$('confirmPop'), confirmYes=$('confirmYes'), confirmNo=$('confirmNo');

const NOTE_COLORS=['yellow','pink','blue','green','lilac','orange','mint'];
const NOTE_COLOR_MAP={yellow:'#f5e36d',pink:'#f6bfd0',blue:'#bfe0f6',green:'#cbe8be',
  lilac:'#dcccf7',orange:'#ffd3a1',mint:'#bfeedc'};
const PEN_COLORS=['#1f2328','#0f6f76','#d94848','#2563eb','#16a34a','#9333ea','#ea580c','#ffffff'];
const TEXT_COLORS=['#1f2328','#d94848','#0f6f76','#2563eb','#16a34a','#9333ea','#7c3f00'];
const PRESETS=[
  {label:'🖥️',title:'Desktop 1920×1080',w:1920,h:1080},
  {label:'💻',title:'Laptop 1366×768',w:1366,h:768},
  {label:'📺',title:'Full HD 1280×720',w:1280,h:720},
  {label:'📟',title:'Tablet 768×1024',w:768,h:1024},
  {label:'📱',title:'Mobile 390×844',w:390,h:844},
];
const PEN_MIN=1,PEN_MAX=40,ERASER_MIN=8,ERASER_MAX=100,FONT_MIN=10,FONT_MAX=36;
const KEY='board-lite-v10';

function uid(){return crypto.randomUUID();}
function clone(o){return JSON.parse(JSON.stringify(o));}
function fmtTime(){return new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});}
function fmtDate(){return new Date().toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'short'});}

const DEF={
  showClock:true,drawMode:false,textMode:false,noteMode:false,
  noteColor:'yellow',penColor:'#1f2328',penSize:7,eraser:false,eraserSize:28,
  boardW:1366,boardH:768,panX:0,panY:0,
  strokes:[],
  notes:[]
};

let state;
try{state={...DEF,...JSON.parse(localStorage.getItem(KEY)||'{}')};}
catch{state=clone(DEF);}
if(!state.boardW)state.boardW=1366;
if(!state.boardH)state.boardH=768;
if(state.panX===undefined)state.panX=0;
if(state.panY===undefined)state.panY=0;

function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch{}}

let drag=null,resizing=null,drawing=false,boardStroke=null,rt=null;
let activeNote=null,pendingDelete=null;
let panning=false,panStart=null,panOrigin=null,panTimer=null;

// ── CLOCK ────────────────────────────────────────────────
function updateClock(){
  timeLine.textContent=fmtTime();dateLine.textContent=fmtDate();
  clockEl.classList.toggle('hidden',!state.showClock);
}
setInterval(()=>{if(state.showClock)updateClock();},30000);

// ── BOARD SIZE & PAN ─────────────────────────────────────
function clampPan(){
  const vw=window.innerWidth,vh=window.innerHeight;
  const minX=Math.min(0,vw-state.boardW),minY=Math.min(0,vh-state.boardH);
  state.panX=Math.max(minX,Math.min(0,state.panX));
  state.panY=Math.max(minY,Math.min(0,state.panY));
}
function applyPan(){board.style.transform=`translate(${state.panX}px,${state.panY}px)`;}

function applyBoardSize(w,h){
  state.boardW=w;state.boardH=h;
  board.style.width=w+'px';board.style.height=h+'px';
  // resize sketch canvas
  const dpr=window.devicePixelRatio||1;
  sketch.width=Math.round(w*dpr);sketch.height=Math.round(h*dpr);
  sketch.style.width=w+'px';sketch.style.height=h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  // clamp post-it dentro la board
  state.notes.forEach(n=>{
    n.x=Math.max(4,Math.min(w-n.w-4,n.x));
    n.y=Math.max(4,Math.min(h-n.h-4,n.y));
  });
  clampPan();applyPan();renderNotes();redrawBoard();
}

// ── VERTICAL SLIDER ──────────────────────────────────────
function makeVSlider({trackEl,fillEl,thumbEl,valEl,min,max,getValue,setValue,onUpdate}){
  function pct(){return Math.max(0,Math.min(1,(getValue()-min)/(max-min)));}
  function render(){
    const p=pct();
    fillEl.style.height=(p*100)+'%';
    thumbEl.style.bottom=(p*100)+'%';
    valEl.textContent=Math.round(getValue());
  }
  function setFromY(e,rect){
    const y=Math.min(Math.max(0,e.clientY-rect.top),rect.height);
    setValue(Math.max(min,Math.min(max,Math.round(max-(y/rect.height)*(max-min)))));
    onUpdate();render();
  }
  let dr=false,rc=null;
  trackEl.addEventListener('pointerdown',e=>{
    dr=true;rc=trackEl.getBoundingClientRect();
    trackEl.setPointerCapture(e.pointerId);setFromY(e,rc);e.stopPropagation();
  });
  trackEl.addEventListener('pointermove',e=>{if(dr)setFromY(e,rc);});
  trackEl.addEventListener('pointerup',()=>{dr=false;save();});
  render();return render;
}

// ── BOARD CANVAS ─────────────────────────────────────────
function initSketchCanvas(){
  const dpr=window.devicePixelRatio||1;
  sketch.width=Math.round(state.boardW*dpr);
  sketch.height=Math.round(state.boardH*dpr);
  sketch.style.width=state.boardW+'px';
  sketch.style.height=state.boardH+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
function redrawBoard(){
  ctx.clearRect(0,0,state.boardW,state.boardH);
  ctx.lineCap='round';ctx.lineJoin='round';
  (state.strokes||[]).forEach(s=>{
    if(!s.points||s.points.length<2)return;
    ctx.globalCompositeOperation=s.eraser?'destination-out':'source-over';
    ctx.strokeStyle=s.eraser?'rgba(0,0,0,1)':(s.color||'#1f2328');
    ctx.lineWidth=s.size||7;
    ctx.beginPath();ctx.moveTo(s.points[0].x,s.points[0].y);
    s.points.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));ctx.stroke();
  });
  ctx.globalCompositeOperation='source-over';
}
function sketchPos(e){
  // coordinate relative al canvas della board (no pan: il canvas è dentro board)
  const r=sketch.getBoundingClientRect();
  return{x:e.clientX-r.left,y:e.clientY-r.top};
}
sketch.addEventListener('pointerdown',e=>{
  if(!state.drawMode)return;
  drawing=true;sketch.setPointerCapture(e.pointerId);
  boardStroke={points:[sketchPos(e)],color:state.penColor,
    size:state.eraser?state.eraserSize:state.penSize,eraser:state.eraser};
  state.strokes.push(boardStroke);redrawBoard();
});
sketch.addEventListener('pointermove',e=>{
  if(!drawing||!boardStroke)return;
  boardStroke.points.push(sketchPos(e));redrawBoard();
});
window.addEventListener('pointerup',()=>{if(drawing){drawing=false;boardStroke=null;save();}});

}

// ── NOTES ────────────────────────────────────────────────
function renderNotes(){
  notesLayer.innerHTML='';
  state.notes.forEach(n=>notesLayer.appendChild(makeNote(n)));
}

function resizeNoteCanvas(nc,note){
  const dpr=window.devicePixelRatio||1;
  const ch=note.h-34;
  nc.width=Math.round(note.w*dpr);nc.height=Math.round(ch*dpr);
  nc.style.width=note.w+'px';nc.style.height=ch+'px';
  const c=nc.getContext('2d');c.setTransform(dpr,0,0,dpr,0,0);
  redrawNoteCanvas(nc,note);
}
function redrawNoteCanvas(nc,note){
  const c=nc.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  c.clearRect(0,0,note.w,note.h);
  c.lineCap='round';c.lineJoin='round';
  (note.noteStrokes||[]).forEach(s=>{
    if(!s.points||s.points.length<2)return;
    c.globalCompositeOperation=s.eraser?'destination-out':'source-over';
    c.strokeStyle=s.eraser?'rgba(0,0,0,1)':(s.color||'#1f2328');
    c.lineWidth=s.size||7;
    c.beginPath();c.moveTo(s.points[0].x,s.points[0].y);
    s.points.slice(1).forEach(p=>c.lineTo(p.x,p.y));c.stroke();
  });
  c.globalCompositeOperation='source-over';
}

function makeNote(note){
  if(!note.w)note.w=210;if(!note.h)note.h=180;
  if(!note.textColor)note.textColor='#1f2328';if(!note.fontSize)note.fontSize=15;
  if(!note.noteStrokes)note.noteStrokes=[];
  const el=document.createElement('article');
  el.className='note';el.dataset.id=note.id;
  el.style.cssText=`left:${note.x}px;top:${note.y}px;width:${note.w}px;height:${note.h}px;`;
  el.style.setProperty('--rot',(note.rot||0)+'deg');
  el.style.background=NOTE_COLOR_MAP[note.color]||NOTE_COLOR_MAP.yellow;
  el.innerHTML=`
    <div class="note-head">
      <button class="mini-btn" data-action="dup" tabindex="-1" type="button">＋</button>
      <button class="mini-btn" data-action="del" tabindex="-1" type="button">×</button>
    </div>
    <textarea spellcheck="false" readonly></textarea>
    <canvas class="note-canvas"></canvas>
    <div class="resize-handle" data-resize></div>
  `;
  const ta=el.querySelector('textarea');
  const nc=el.querySelector('canvas.note-canvas');
  ta.value=note.text;ta.style.color=note.textColor;ta.style.fontSize=note.fontSize+'px';
  ta.addEventListener('input',()=>{
    note.text=ta.value;note.updatedAt=Date.now();
    save();
  });

  // Testo — click sul corpo
  el.addEventListener('click',e=>{
    if(!state.textMode)return;
    if(e.target.closest('[data-action]')||e.target.closest('[data-resize]')||
       e.target.closest('.note-canvas')||e.target.closest('.note-head'))return;
    activateNote(note,el);
  });

  // Del
  el.querySelector('[data-action="del"]').addEventListener('click',e=>{
    e.stopPropagation();
    showConfirm(e.currentTarget,()=>{
      state.notes=state.notes.filter(n=>n.id!==note.id);
      if(activeNote&&activeNote.note.id===note.id)deactivateNote();
      renderNotes();save();
    });
  });

  // Dup
  el.querySelector('[data-action="dup"]').addEventListener('click',e=>{
    e.stopPropagation();
    const dup={...clone(note),id:uid(),
      x:Math.min(state.boardW-note.w-4,note.x+20),
      y:Math.min(state.boardH-note.h-4,note.y+20),
      noteStrokes:clone(note.noteStrokes||[]),updatedAt:Date.now()};
    state.notes.push(dup);renderNotes();save();
  });

  // Drag dalla head
  const head=el.querySelector('.note-head');
  head.addEventListener('pointerdown',e=>{
    if(e.target.closest('[data-action]'))return;
    drag={id:note.id,ox:e.clientX-note.x-state.panX,oy:e.clientY-note.y-state.panY};
    el.classList.add('dragging');el.setPointerCapture(e.pointerId);e.stopPropagation();
  });
  el.addEventListener('pointermove',e=>{
    if(drag&&drag.id===note.id){
      note.x=Math.max(4,Math.min(state.boardW-note.w-4,e.clientX-state.panX-drag.ox));
      note.y=Math.max(4,Math.min(state.boardH-note.h-4,e.clientY-state.panY-drag.oy));
      el.style.left=note.x+'px';el.style.top=note.y+'px';
    }
    if(resizing&&resizing.id===note.id){
      note.w=Math.max(120,Math.min(state.boardW-note.x-4,resizing.sw+(e.clientX-resizing.sx)));
      note.h=Math.max(100,Math.min(state.boardH-note.y-4,resizing.sh+(e.clientY-resizing.sy)));
      el.style.width=note.w+'px';el.style.height=note.h+'px';
      resizeNoteCanvas(nc,note);
    }
  });
  el.addEventListener('pointerup',()=>{
    if(drag&&drag.id===note.id){drag=null;el.classList.remove('dragging');save();}
    if(resizing&&resizing.id===note.id){resizing=null;save();}
  });

  // Resize
  const rh=el.querySelector('[data-resize]');
  rh.addEventListener('pointerdown',e=>{
    e.stopPropagation();
    resizing={id:note.id,sx:e.clientX,sy:e.clientY,sw:note.w,sh:note.h};
    el.setPointerCapture(e.pointerId);
  });
  rh.addEventListener('click',e=>e.stopPropagation());

  // Note canvas draw — usa getBoundingClientRect (dentro board che è traslata)
  // r.left/top include già il pan (perché board è traslata nel DOM)
  // quindi e.clientX - r.left = coordinate locali al canvas. CORRETTO.
  resizeNoteCanvas(nc,note);
  let nd=false,ns=null;
  function np(e){
    const r=nc.getBoundingClientRect();
    return{x:e.clientX-r.left,y:e.clientY-r.top};
  }
  nc.addEventListener('pointerdown',e=>{
    if(!state.drawMode)return;
    nd=true;nc.setPointerCapture(e.pointerId);
    ns={points:[np(e)],color:state.penColor,
      size:state.eraser?state.eraserSize:state.penSize,eraser:state.eraser};
    note.noteStrokes.push(ns);redrawNoteCanvas(nc,note);
    e.stopPropagation();
  });
  nc.addEventListener('pointermove',e=>{
    if(!nd||!ns)return;
    ns.points.push(np(e));redrawNoteCanvas(nc,note);
  });
  nc.addEventListener('pointerup',()=>{
    if(nd){nd=false;ns=null;save();}
  });
  nc.addEventListener('pointercancel',()=>{nd=false;ns=null;});

  if(state.drawMode&&!state.eraser)nc.classList.add('draw-on');
  if(state.drawMode&&state.eraser)nc.classList.add('eraser-on');
  return el;
}

  const a=document.createElement('a');
  const ts=new Date().toISOString().slice(0,16).replace('T','_').replace(':','-');
  a.href=url;a.download=`board-${ts}.json`;a.click();
  URL.revokeObjectURL(url);
  openDrawer(false);
});

$('importFile').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const imported=JSON.parse(ev.target.result);
      if(typeof imported!=='object'||!imported.notes)throw new Error('formato non valido');
      Object.assign(state,imported);
      save();
      applyBoardSize(state.boardW||1366,state.boardH||768);
      applyPan();renderNotes();redrawBoard();
      updateClock();syncDraw();renderPresets();
      openDrawer(false);
    }catch(err){alert('Import fallito: '+err.message);}
    e.target.value='';
  };
  reader.readAsText(file);
});

})();
</script>

// ── Login Google (popup) ──────────────────────────────────
googleBtn.addEventListener('click', async () => {
  googleBtn.disabled = true;
  googleBtn.innerHTML = '<span class="auth-spinner"></span>';

  try {
    const client     = await getClient();
    const redirectTo = window.location.href.split('?')[0].split('#')[0];
    const { data, error } = await client.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo, skipBrowserRedirect: true },
    });
    if (error || !data?.url) throw error ?? new Error();

    const popup = window.open(
      data.url, 'sb-oauth',
      'width=520,height=640,popup=yes,left=' +
        Math.round(window.screenX + (window.outerWidth  - 520) / 2) +
        ',top='  + Math.round(window.screenY + (window.outerHeight - 640) / 2)
    );

    if (!popup) { window.location.href = data.url; return; }

    const iv = setInterval(async () => {
      if (!popup.closed) return;
      clearInterval(iv);
      const { data: { session } } = await (await getClient()).auth.getSession();
      renderAuth(session);
    }, 600);

  } catch {
    renderAuth(null);
  }
});

// ── Logout ────────────────────────────────────────────────
logoutBtn.addEventListener('click', async () => {
  (await getClient()).auth.signOut();
});

// ── Bootstrap ─────────────────────────────────────────────
(async () => {
  try {
    const client = await getClient();
    const { data: { session } } = await client.auth.getSession();

    // Siamo nel popup OAuth: Supabase ha già salvato la sessione → chiudi
    if (window.opener && session) {
      window.close();
      return;
    }

    renderAuth(session);
    client.auth.onAuthStateChange((_e, session) => renderAuth(session));
  } catch {
    renderAuth(null);
  }
})();
</script>
