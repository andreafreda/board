<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Board</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link rel="apple-touch-icon" href="favicon.svg"/>
<meta name="theme-color" content="#1A6B5A"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#FAF8F5;--board:#FFFFFF;--dot:#CDC2B0;
  --text:#1A1714;--muted:#8a8278;--border:rgba(26,23,20,.08);
  --surface:rgba(255,255,255,.92);--shadow:0 16px 48px rgba(26,23,20,.12);
  --ssoft:0 2px 12px rgba(26,23,20,.07);--primary:#1A6B5A;--danger:#c0392b;
  --radius:14px;--radius-sm:10px;--radius-lg:18px;
}
[data-theme="dark"]{
  --bg:#1A1A1F;--board:#23232A;--dot:#2E2E3A;
  --text:#E8E6E0;--muted:#888;--border:rgba(255,255,255,.08);
  --surface:rgba(30,30,40,.92);--shadow:0 16px 48px rgba(0,0,0,.4);
  --ssoft:0 4px 12px rgba(0,0,0,.22);--primary:#4CAF83;--danger:#ff7c7c;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'DM Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  font-feature-settings:'ss01','cv11';-webkit-font-smoothing:antialiased;}
button,textarea,input{font:inherit;color:inherit;border:none;background:none;cursor:pointer;}
:focus-visible{outline:2px solid var(--primary);outline-offset:2px;}

/* Viewport — dot grid background lives on the viewport so it covers the canvas
   even outside the board edges (the design treats the whole canvas as paper). */
#viewport{position:fixed;inset:0;overflow:hidden;background:var(--bg);
  background-image:radial-gradient(circle,var(--dot) 1.4px,transparent 1.6px);
  background-size:24px 24px;background-position:0 0;}

/* Board — kept transparent so the viewport dot grid reads through and feels
   like one continuous canvas. The board is just a logical pannable surface;
   notes / strokes are positioned on top of the dot pattern. */
#board{
  position:absolute;top:0;left:0;
  width:1366px;height:768px;
  background:transparent;
  transform-origin:0 0;touch-action:none;user-select:none;
}
/* v2.0: dashed frame around the board so the user can see the canvas edges
   when they pick a resolution. Toggleable from the dimensioni-board popover. */
body.frame-on #board{
  outline:1.5px dashed rgba(26,23,20,.18);
  outline-offset:0;
  border-radius:6px;
}
/* Floating "1920 × 1080" tag at the top-left corner of the frame */
body.frame-on #board::before{
  content:attr(data-size);
  position:absolute;top:-22px;left:0;
  font-size:.62rem;font-weight:600;color:var(--muted);
  font-variant-numeric:tabular-nums;letter-spacing:.04em;opacity:.75;
}

/* Auth card */
/* The d-user-card now carries its own bottom border, so .d-auth doesn't
   need one when the user is signed in. Keep a small divider for guests. */
.d-auth{padding:.2rem 0 .4rem;}
#authGuestRow{padding-bottom:.6rem;border-bottom:1px solid var(--border);}
.d-google-btn{width:100%;height:46px;border-radius:12px;
  border:1px solid var(--border);background:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--ssoft);transition:box-shadow .15s,transform .15s;}
.d-google-btn:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
.d-google-btn:active{transform:translateY(0);}
/* User-card header (v2.0) — avatar + stacked name/email + close X.
   Visually flat, no green tint background — close to the design prototype. */
.d-user-card{display:flex;align-items:center;gap:12px;padding:.6rem .5rem 1rem;
  border-bottom:1px solid var(--border);margin-bottom:.6rem;}
.auth-avatar{width:40px;height:40px;border-radius:12px;
  background:var(--primary);color:#fff;display:grid;place-items:center;
  font-size:1rem;font-weight:700;flex-shrink:0;overflow:hidden;}
.auth-avatar img{width:100%;height:100%;border-radius:12px;object-fit:cover;}
.d-user-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px;}
.d-uname{font-size:.88rem;font-weight:600;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
.d-uemail{font-size:.7rem;color:var(--muted);font-weight:400;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
/* Close X — sits inline next to Google button (guests) or next to the
   user info (signed-in). Same look in both cases. */
.d-close-btn{width:30px;height:30px;border-radius:8px;border:none;
  background:color-mix(in srgb,var(--text) 5%,transparent);
  color:var(--muted);display:grid;place-items:center;cursor:pointer;
  font-family:inherit;flex-shrink:0;
  transition:background .15s,color .15s;}
.d-close-btn:hover{background:color-mix(in srgb,var(--text) 10%,transparent);color:var(--text);}

/* Guest row: Google button takes the leftover space, X sits to the right. */
.d-guest-row{display:flex;align-items:center;gap:8px;}
.d-guest-row .d-google-btn{flex:1;}

/* Big green new-board button — full width pill below the user card */
.d-new-board{display:none;width:100%;height:44px;border-radius:12px;border:none;
  background:var(--primary);color:#fff;cursor:pointer;
  align-items:center;justify-content:center;
  margin-bottom:.6rem;
  box-shadow:0 1px 2px rgba(26,107,90,.18),0 4px 12px rgba(26,107,90,.16);
  transition:filter .15s,transform .12s;}
.d-new-board:hover{filter:brightness(1.06);}
.d-new-board:active{transform:translateY(1px);}

/* Drawer footer — small logout button bottom-left */
.d-footer{display:none;align-items:center;justify-content:flex-end;
  padding:.5rem 0 .1rem;margin-top:.4rem;border-top:1px solid var(--border);}
.d-logout-btn{display:flex;align-items:center;gap:6px;
  height:34px;padding:0 .8rem;border-radius:10px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-size:.78rem;font-weight:500;cursor:pointer;
  font-family:inherit;transition:background .15s,color .15s,border-color .15s;}
.d-logout-btn:hover{background:color-mix(in srgb,var(--danger) 8%,transparent);
  color:var(--danger);border-color:color-mix(in srgb,var(--danger) 30%,var(--border));}
.auth-spinner{width:18px;height:18px;border-radius:999px;
  border:2px solid var(--border);border-top-color:var(--primary);
  animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Board list section in drawer */
.d-sec{padding:.42rem 0;border-top:1px solid var(--border);}
.d-sec-boards{border-top:none;padding-top:.2rem;}
/* Section divider header: small icon + horizontal rule (Board Redesign v2.0) */
.d-section-hdr{display:flex;align-items:center;gap:8px;
  padding:.45rem 8px .35rem;color:var(--muted);opacity:.7;}
.d-section-hdr svg{flex-shrink:0;}
.d-section-rule{flex:1;height:1px;background:var(--border);}
.d-board{display:flex;align-items:center;gap:6px;padding:.3rem .35rem;
  border-radius:10px;cursor:pointer;border:1px solid transparent;transition:background .1s;}
.d-board:hover{background:color-mix(in srgb,var(--border) 42%,transparent);}
.d-board.active{background:color-mix(in srgb,var(--primary) 10%,transparent);
  border-color:color-mix(in srgb,var(--primary) 22%,transparent);}
.d-board.local{cursor:default;}
.d-board.local:hover{background:color-mix(in srgb,var(--primary) 6%,transparent);}
.d-dot{width:7px;height:7px;border-radius:999px;background:var(--muted);
  opacity:.3;flex-shrink:0;transition:opacity .1s,background .1s;}
.d-board.active .d-dot{background:var(--primary);opacity:1;}
.d-bname{flex:1;font-size:.82rem;font-weight:500;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
.d-acts{display:flex;gap:1px;opacity:0;transition:opacity .12s;flex-shrink:0;}
.d-board:hover .d-acts,.d-board.active .d-acts{opacity:1;}
.d-bib{width:22px;height:22px;border-radius:6px;font-size:.68rem;
  display:grid;place-items:center;border:none;background:transparent;
  color:var(--muted);transition:background .1s,color .1s;}
.d-bib:hover{background:color-mix(in srgb,var(--border) 65%,transparent);color:var(--text);}
.d-bib.del:hover{color:var(--danger);}
.d-binp{flex:1;font-size:.82rem;border-radius:7px;
  border:1px solid var(--primary);background:var(--surface);
  padding:0 5px;height:26px;color:var(--text);outline:none;min-width:0;}

/* Clock */
.clock{position:fixed;top:14px;left:14px;z-index:30;
  padding:.32rem .7rem;border-radius:12px;background:var(--surface);
  border:1px solid var(--border);box-shadow:var(--ssoft);
  user-select:none;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  line-height:1.3;font-variant-numeric:tabular-nums;}
.clock .tl{font-size:.8rem;font-weight:700;}
.clock .dl{font-size:.66rem;opacity:.65;}
.clock.hidden{display:none;}
/* Version label — small monospaced tag at the bottom-right of the clock area
   (top-left). Stays readable but doesn't compete with the chrome. */
.version{position:fixed;top:60px;left:18px;z-index:36;
  font-size:.62rem;color:var(--muted);opacity:.7;font-weight:600;
  letter-spacing:.04em;font-variant-numeric:tabular-nums;
  user-select:none;pointer-events:none;padding:0 2px;}
body:not(.has-clock) .version{top:18px;left:80px;}

/* Board pill — fixed top-left. Sized to its content (no flex parent). */
.board-pill{position:fixed;top:14px;left:14px;z-index:38;
  display:none;align-items:center;gap:6px;
  padding:.42rem .8rem;border-radius:12px;
  background:var(--surface);border:1px solid var(--border);box-shadow:var(--ssoft);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  font-size:.82rem;font-weight:500;color:var(--text);
  cursor:pointer;
  /* Never shrink below something readable; only cap on wide screens. */
  max-width:max(140px, calc(100vw - 240px));
  transition:background .15s;font-family:inherit;}
body.has-clock .board-pill{top:74px;}
/* Hidden in v2.0.8 — only the avatar/hamburger opens the drawer now.
   The element stays in the DOM (some modules read its name span). */
.board-pill.on{display:none;}
.board-pill:hover{background:color-mix(in srgb,var(--text) 4%,var(--surface));}
.board-pill .bp-name{flex:0 1 auto;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.board-pill .bp-caret{flex-shrink:0;opacity:.55;font-size:.7rem;}

/* Corner — share + avatar cluster at the top-right.
   The drawer opens from the avatar; share copies the board URL. */
.corner{position:fixed;top:14px;right:14px;z-index:40;display:flex;gap:8px;}
.cbtn-share{width:32px;height:32px;border-radius:8px;border:none;
  background:var(--primary);color:#fff;
  display:grid;place-items:center;cursor:pointer;
  box-shadow:var(--ssoft);transition:filter .15s,transform .12s;}
.cbtn-share:hover{filter:brightness(1.07);}
.cbtn-share:active{transform:scale(.96);}
.cbtn-share.copied{background:#1A1714;}
.cbtn#hamburger{width:32px;height:32px;border-radius:8px;border:none;
  background:var(--primary);color:#fff;font-weight:700;font-size:.82rem;
  display:grid;place-items:center;
  box-shadow:var(--ssoft);transition:filter .15s,transform .12s;
  font-family:inherit;}
.cbtn#hamburger:hover{filter:brightness(1.07);}
.cbtn#hamburger:active{transform:scale(.96);}
/* When signed in: avatar image / initial replaces the ☰ glyph */
.cbtn#hamburger.avatar-mode{padding:0;overflow:hidden;border-radius:50%;
  font-size:.82rem;}
.cbtn#hamburger.avatar-mode img{display:block;width:100%;height:100%;
  border-radius:50%;object-fit:cover;}

/* Mode picker — always-visible floating pill, bottom-center.
   Hosts the 3 mode buttons; the contextual toolbars float right above it. */
.mode-picker{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  z-index:55;display:flex;align-items:center;gap:4px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:6px;height:52px;
  box-shadow:0 8px 32px rgba(26,23,20,.10),0 2px 8px rgba(26,23,20,.06);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.mp-btn{width:40px;height:40px;border-radius:12px;border:none;
  background:transparent;color:var(--muted);
  display:grid;place-items:center;font-size:.98rem;font-weight:600;
  cursor:pointer;transition:background .15s,color .15s;
  font-family:inherit;padding:0;}
.mp-btn svg{display:block;}
.mp-btn:hover{background:color-mix(in srgb,var(--text) 5%,transparent);color:var(--text);}
.mp-btn.on{background:color-mix(in srgb,var(--text) 8%,transparent);color:var(--text);}
.mp-sep{width:1px;height:24px;background:var(--border);margin:0 2px;}
@media (max-width:600px){
  .mode-picker{bottom:16px;border-radius:22px;padding:8px;height:60px;}
  .mp-btn{width:48px;height:48px;}
}

/* Drawer — full-height slide-in from the right (Board Redesign v2.0) */
.drawer{position:fixed;top:0;right:0;height:100dvh;z-index:60;
  width:min(320px,100vw);
  background:var(--surface);border-left:1px solid var(--border);
  box-shadow:-12px 0 40px rgba(26,23,20,.10);
  padding:.9rem .8rem;
  transform:translateX(100%);
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  overflow-y:auto;display:block;visibility:hidden;}
.drawer.open{transform:translateX(0);visibility:visible;}
@media (max-width:600px){.drawer{width:100vw;border-left:none;}}
/* Backdrop behind drawer */
.drawer-backdrop{position:fixed;inset:0;z-index:55;
  background:rgba(26,23,20,.18);backdrop-filter:blur(2px);
  opacity:0;pointer-events:none;transition:opacity .2s;}
.drawer-backdrop.on{opacity:1;pointer-events:auto;}
.dsec{padding:.38rem 0;border-bottom:1px solid var(--border);display:grid;gap:.4rem;}
.dsec:last-child{border-bottom:0;}
.drow{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.dbtn{min-height:40px;flex:1;border-radius:11px;border:1px solid var(--border);
  background:transparent;font-size:.84rem;font-weight:500;color:var(--text);
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-family:inherit;cursor:pointer;
  transition:background .15s,border-color .15s;}
.dbtn svg{flex-shrink:0;color:var(--muted);}
.dbtn.danger svg{color:var(--danger);}
.dbtn:hover{background:color-mix(in srgb,var(--text) 4%,transparent);
  border-color:color-mix(in srgb,var(--text) 14%,var(--border));}
.dbtn.danger{color:var(--danger);}
.dbtn.danger:hover{background:color-mix(in srgb,var(--danger) 6%,transparent);}
/* legacy preset row — left as no-op; new device cards live in .bs-presets */
.preset-row{display:none;}

/* ── Dimensioni board popover (v2.0) ─────────────────────────────── */
.bs-pop{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);z-index:65;
  width:min(360px,calc(100vw - 28px));
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;
  box-shadow:0 16px 48px rgba(26,23,20,.16);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.bs-pop[hidden]{display:none;}
.bs-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.bs-title{font-size:.66rem;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:var(--muted);}
.bs-frame-toggle{width:24px;height:24px;border-radius:6px;border:none;
  background:transparent;color:var(--muted);
  display:grid;place-items:center;cursor:pointer;
  transition:background .15s,color .15s;}
.bs-frame-toggle:hover{background:color-mix(in srgb,var(--text) 5%,transparent);color:var(--text);}
.bs-frame-toggle.on{background:var(--primary);color:#fff;}
.bs-presets{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px;}
.preset-card{padding:10px 4px;border-radius:10px;
  border:1px solid var(--border);background:transparent;color:var(--text);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;font-family:inherit;transition:all .15s;}
.preset-card:hover{background:color-mix(in srgb,var(--text) 4%,transparent);}
.preset-card span{font-size:9.5px;font-weight:600;letter-spacing:.2px;}
.preset-card.active{border-color:var(--primary);
  background:color-mix(in srgb,var(--primary) 7%,transparent);color:var(--primary);}
.bs-inputs{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.bs-input{flex:1;position:relative;}
.bs-input span{position:absolute;top:-6px;left:10px;
  font-size:9px;font-weight:700;color:var(--muted);
  background:var(--surface);padding:0 4px;letter-spacing:.4px;}
.bs-input input{width:100%;height:38px;padding:0 12px;border-radius:9px;
  border:1px solid var(--border);background:transparent;color:var(--text);
  font:600 13px/1 'DM Sans',inherit;font-variant-numeric:tabular-nums;
  outline:none;text-align:center;}
.bs-input input:focus{border-color:color-mix(in srgb,var(--primary) 50%,var(--border));}
.bs-x{color:var(--muted);font-size:11px;font-weight:600;}
.bs-actions{display:flex;gap:6px;margin-bottom:8px;}
.bs-action{flex:1;height:38px;border-radius:9px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);display:grid;place-items:center;cursor:pointer;
  transition:background .15s,color .15s,border-color .15s;}
.bs-action:hover{color:var(--primary);border-color:color-mix(in srgb,var(--primary) 30%,var(--border));
  background:color-mix(in srgb,var(--primary) 5%,transparent);}
.bs-help{font-size:10.5px;color:var(--muted);opacity:.78;line-height:1.4;}
.mp-btn.on{background:color-mix(in srgb,var(--primary) 8%,transparent);color:var(--primary);}
.size-inputs{display:grid;grid-template-columns:1fr auto 1fr;gap:5px;align-items:center;}
.size-inputs input[type=number]{width:100%;min-height:36px;border-radius:9px;
  border:1px solid var(--border);background:var(--surface);padding:0 6px;
  font-size:.84rem;text-align:center;}
.size-inputs span{font-size:.8rem;text-align:center;color:var(--muted);}

/* Floating pill toolbars — bottom-center, glassmorphism */
/* Contextual toolbars float just above the mode picker (which sits at
   bottom 24, height 52 → top edge ≈ 76). Leave a small gap. */
.toolbar{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  z-index:50;display:none;align-items:center;gap:6px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:6px 10px;
  box-shadow:0 8px 32px rgba(26,23,20,.10),0 2px 8px rgba(26,23,20,.06);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  white-space:nowrap;height:52px;overflow:visible;
  max-width:calc(100vw - 32px);}
@media (max-width:600px){
  .toolbar{bottom:90px;}
}
.toolbar.visible{display:flex;}
.tb-sep{width:1px;height:24px;background:var(--border);margin:0 2px;align-self:center;}
.tb-btn{width:40px;height:40px;border-radius:12px;border:none;
  background:transparent;color:var(--muted);
  display:grid;place-items:center;font-size:.95rem;align-self:center;
  transition:background .15s,color .15s;}
.tb-btn:hover{background:color-mix(in srgb,var(--text) 5%,transparent);color:var(--text);}
.tb-btn.active{background:color-mix(in srgb,var(--text) 8%,transparent);color:var(--text);}
@media (max-width:600px){.tb-btn{width:48px;height:48px;}}
.tb-dot{border-radius:999px;border:2px solid transparent;flex:0 0 auto;cursor:pointer;align-self:center;}
.tb-dot.active{border-color:var(--text);}
/* Rainbow "custom color" swatch — opens a native color picker */
.tb-dot-custom{position:relative;
  background:conic-gradient(#ff4d4d,#ffb84d,#fff04d,#7be07b,#4dc8ff,#9b6bff,#ff4d9b,#ff4d4d) !important;}
.tb-dot-custom input[type="color"]{position:absolute;inset:0;width:100%;height:100%;
  opacity:0;cursor:pointer;border:none;padding:0;background:none;}

/* Vertical slider — value at top, track at bottom. Both extremes of the
   thumb (Ø 20 px) need 10 px of breathing room so it doesn't spill out
   of the pill, hence the asymmetric padding/margins below. */
.vslider-wrap{position:absolute;right:14px;bottom:calc(100% + 4px);
  display:flex;flex-direction:column;align-items:center;
  gap:4px;cursor:ns-resize;user-select:none;touch-action:none;
  width:36px;padding:6px 0 12px; /* 12 bottom = thumb half + 2 px breathing */
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;box-shadow:var(--ssoft);}
.vslider-val{font-size:.66rem;font-weight:700;color:var(--primary);
  font-variant-numeric:tabular-nums;line-height:1;text-align:center;
  width:100%;margin-bottom:8px;}
.vslider-track{width:8px;height:64px;
  /* Only need top margin: bottom is handled by the wrap padding so the
     thumb at value=min sits right at the bottom of the pill. */
  margin:12px 0 0;
  background:color-mix(in srgb,var(--border) 80%,transparent);
  border-radius:999px;position:relative;}
.vslider-fill{position:absolute;bottom:0;left:0;right:0;border-radius:999px;background:var(--primary);}
.vslider-thumb{position:absolute;left:50%;transform:translate(-50%,-50%);
  width:20px;height:20px;border-radius:999px;
  background:var(--surface);border:2px solid var(--primary);
  box-shadow:0 2px 8px rgba(0,0,0,.18);}
.vslider-preview{width:22px;height:22px;border-radius:999px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  align-self:center;}

/* Fullscreen — small floating square bottom-right */
.fab-fs{position:fixed;bottom:14px;right:14px;z-index:41;
  width:40px;height:40px;border-radius:12px;background:var(--surface);
  border:1px solid var(--border);box-shadow:var(--ssoft);color:var(--muted);
  display:grid;place-items:center;font-size:1rem;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  transition:color .15s;}
.fab-fs:hover{color:var(--text);}

/* Confirm popup */
.confirm-pop{position:fixed;z-index:60;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:.85rem 1rem;display:none;flex-direction:column;gap:.6rem;
  min-width:220px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  animation:popIn .15s ease;}
.confirm-pop.open{display:flex;}
@keyframes popIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.confirm-pop p{margin:0;font-size:.88rem;font-weight:600;}
.confirm-pop .pop-row{display:flex;gap:8px;}
.confirm-pop .pop-btn{flex:1;min-height:38px;border-radius:11px;
  border:1px solid var(--border);background:var(--surface);font-size:.84rem;font-weight:600;}
.confirm-pop .pop-btn.danger{background:var(--danger);color:#fff;border-color:transparent;}

/* Pan indicator */
.pan-ind{position:fixed;bottom:10px;left:10px;z-index:35;
  font-size:.65rem;color:var(--muted);opacity:0;transition:opacity .4s;
  background:color-mix(in srgb,var(--surface) 88%,transparent);
  border:1px solid var(--border);border-radius:999px;padding:.2rem .5rem;
  pointer-events:none;}
.pan-ind.show{opacity:1;}

/* Notes layer */
.notes-layer{position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;}
.note{pointer-events:auto;}

/* Draw layer */
.draw-layer{position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;z-index:1;background:transparent;}
.draw-layer.on{pointer-events:auto;cursor:crosshair;}
.draw-layer.eraser-on{cursor:cell;}

/* View mode banner */
.view-banner{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:50;
  display:none;align-items:center;gap:10px;
  background:var(--surface);border:1px solid var(--border);border-radius:999px;
  padding:.4rem 1rem;box-shadow:var(--shadow);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  white-space:nowrap;max-width:calc(100vw - 40px);}
.view-banner.on{display:flex;}
.view-banner-name{font-size:.8rem;font-weight:600;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.view-exit-btn{width:28px;height:28px;border-radius:8px;flex-shrink:0;
  display:grid;place-items:center;font-size:.85rem;
  border:1px solid var(--border);background:var(--surface);
  opacity:.7;transition:opacity .15s,background .12s;}
.view-exit-btn:hover{opacity:1;background:color-mix(in srgb,var(--primary) 8%,var(--surface));}

/* Visibility badge */
.vis-btn{width:22px;height:22px;border-radius:6px;font-size:.72rem;
  display:grid;place-items:center;border:none;background:transparent;
  opacity:.35;transition:background .1s,color .1s,opacity .1s;flex-shrink:0;}
.d-board:hover .vis-btn,.d-board.active .vis-btn{opacity:.75;}
.vis-btn.pub{opacity:1;color:var(--primary);}
.vis-btn:hover{opacity:1!important;background:color-mix(in srgb,var(--border) 65%,transparent);}

/* Share link row */
.d-share-row{display:flex;gap:6px;padding:.1rem .35rem .2rem;}
.d-copy-btn{flex:1;min-height:30px;border-radius:9px;border:1px solid var(--border);
  background:var(--surface);font-size:.8rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:background .12s,border-color .12s,color .12s;}
.d-copy-btn:hover{background:color-mix(in srgb,var(--primary) 7%,var(--surface));
  border-color:color-mix(in srgb,var(--primary) 30%,transparent);}
.d-copy-btn.copied{color:var(--primary);border-color:color-mix(in srgb,var(--primary) 40%,transparent);}

/* Note — minimal flat pastel rectangle, soft shadow, drag handle bar.
   v2.0: bigger radius (16) and forced rotation:0 to match the design. */
.note{position:absolute;border-radius:16px;
  box-shadow:0 2px 12px rgba(26,23,20,.07);
  border:1.5px solid transparent;
  padding:1.4rem .9rem .7rem;display:flex;flex-direction:column;
  min-width:140px;min-height:120px;
  transform:rotate(0deg);
  transition:box-shadow .15s,border-color .15s;}
/* Drag-indicator bar: top-left short stripe, like the prototype */
.note::before{content:'';position:absolute;top:10px;left:12px;
  width:28px;height:3px;border-radius:2px;background:rgba(26,23,20,.22);opacity:.6;}
.note:hover{box-shadow:0 4px 16px rgba(26,23,20,.10);}
.note.text-active{box-shadow:0 0 0 2px color-mix(in srgb,var(--primary) 40%,transparent),0 8px 24px rgba(26,23,20,.12);
  border-color:color-mix(in srgb,var(--primary) 40%,transparent);}
.note-head{position:absolute;inset:0 0 auto 0;height:34px;z-index:5;
  display:flex;align-items:center;justify-content:flex-end;
  padding:5px 7px 0 0;gap:5px;cursor:grab;}
.note.dragging .note-head{cursor:grabbing;}
/* Note action buttons (× / +) — invisible until the note is hovered / focused
   so the post-it stays clean while idle, like in the prototype. */
.mini-btn{width:20px;height:20px;border-radius:50%;
  background:rgba(26,23,20,.10);
  display:grid;place-items:center;color:rgba(26,23,20,.55);font-size:.72rem;
  transition:opacity .15s,background .12s,color .12s;border:none;
  opacity:0;pointer-events:none;}
.note:hover .mini-btn,.note.text-active .mini-btn{opacity:1;pointer-events:auto;}
.mini-btn:hover{background:rgba(26,23,20,.18);color:rgba(26,23,20,.9);}
/* Resize handle: same idle/active treatment */
.note .resize-handle{opacity:0;transition:opacity .15s;}
.note:hover .resize-handle,.note.text-active .resize-handle{opacity:.55;}
.note textarea{width:100%;flex:1;border:0;outline:0;background:transparent;
  resize:none;padding-top:.3rem;line-height:1.4;pointer-events:none;}
.note textarea.editable{pointer-events:auto;}
.resize-handle{position:absolute;right:0;bottom:0;width:22px;height:22px;
  cursor:se-resize;z-index:5;display:flex;align-items:flex-end;
  justify-content:flex-end;padding:4px;}
.resize-handle::after{content:'';display:block;width:10px;height:10px;
  border-right:2px solid rgba(0,0,0,.22);border-bottom:2px solid rgba(0,0,0,.22);
  border-radius:0 0 4px 0;}
.note-canvas{position:absolute;top:34px;left:0;right:0;bottom:0;
  width:100%;height:calc(100% - 34px);
  pointer-events:none;border-radius:0 0 inherit inherit;z-index:4;}
.note-canvas.draw-on{pointer-events:auto;cursor:crosshair;}
.note-canvas.eraser-on{pointer-events:auto;cursor:cell;}

/* Pre-view-mode: hide editing UI and stale board content while loading shared board */
html.pending-view .corner,
html.pending-view .drawer,
html.pending-view .version,
html.pending-view #board,
html.pending-view #notesLayer,
html.pending-view .pan-ind { visibility: hidden !important; }

/* Peers stack — top-center pill of avatars on cooperative boards */
/* v2.0: presence stack lives top-right, immediately left of the corner pill.
   The corner is ~ 4×36 + 4px padding = ~ 152px wide → leave 168px clearance. */
.peers-stack{position:fixed;top:14px;right:172px;z-index:38;
  display:none;align-items:center;gap:0;
  padding:4px 12px 4px 6px;background:var(--surface);border:1px solid var(--border);
  border-radius:999px;box-shadow:var(--ssoft);height:44px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  max-width:calc(100vw - 220px);}
@media (max-width:600px){
  /* On mobile the corner shrinks; tuck the stack just below it. */
  .peers-stack{right:14px;top:64px;}
}
.peers-stack.on{display:flex;}
.peer-avatar{width:28px;height:28px;border-radius:50%;
  display:grid;place-items:center;font-size:.72rem;font-weight:700;color:#fff;
  border:2px solid var(--surface);margin-left:-8px;position:relative;flex-shrink:0;
  overflow:visible;}
.peer-avatar:first-child{margin-left:0;}
.peer-avatar.viewer{opacity:.7;}
.peer-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover;}
.peer-avatar .peer-role{position:absolute;bottom:-3px;right:-3px;
  font-size:.55rem;background:var(--surface);border:1px solid var(--border);
  border-radius:50%;width:14px;height:14px;display:grid;place-items:center;
  line-height:1;}
.peer-avatar.peer-overflow{background:var(--muted);font-size:.62rem;}
.peers-counts{font-size:.7rem;color:var(--muted);margin-left:8px;white-space:nowrap;}

/* Live cursors layer — sits inside #board so it inherits the pan transform */
.cursors-layer{position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;z-index:6;overflow:visible;}
.peer-cursor{position:absolute;top:0;left:0;display:flex;align-items:flex-start;gap:3px;
  pointer-events:none;will-change:transform;
  transition:transform 80ms linear,opacity .25s;
  opacity:0;}
.peer-cursor.on{opacity:1;}
.peer-cursor svg{flex-shrink:0;filter:drop-shadow(0 1px 2px rgba(0,0,0,.25));}
.peer-cursor-name{background:var(--c);color:#fff;font-size:.62rem;font-weight:600;
  padding:2px 6px;border-radius:5px;white-space:nowrap;line-height:1.2;
  margin-top:14px;box-shadow:0 1px 3px rgba(0,0,0,.18);}

/* Cloud sync status pill (only shown when logged in) */
/* v2.0: tiny saved-status dot — placed by JS just to the right of the pill. */
.status-badge{position:fixed;top:14px;left:14px;z-index:38;
  display:none;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:10px;
  background:var(--surface);border:1px solid var(--border);box-shadow:var(--ssoft);
  user-select:none;pointer-events:none;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  font-size:0;
  transition:left .12s;}
.status-badge.on{display:inline-flex;}
.status-badge::before{content:'';display:block;width:8px;height:8px;
  border-radius:50%;background:currentColor;
  box-shadow:0 0 0 2px color-mix(in srgb,currentColor 22%,transparent);}
body.has-clock .status-badge{top:74px;}
.status-badge.saved  {color:#1A6B5A;}
.status-badge.saving {color:#ea580c;}
.status-badge.offline{color:var(--danger);
  border-color:color-mix(in srgb,var(--danger) 35%,var(--border));}

/* GDPR-style consent banner — shown once on first visit */
.consent-banner{position:fixed;left:14px;right:14px;bottom:14px;z-index:90;
  display:none;align-items:center;gap:.9rem;
  padding:.8rem 1rem;border-radius:var(--radius);
  background:var(--surface);border:1px solid var(--border);
  box-shadow:var(--shadow);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  font-size:.78rem;line-height:1.4;
  animation:consentIn .25s ease;}
.consent-banner.on{display:flex;}
.consent-text{flex:1;min-width:0;}
.consent-text a{color:var(--primary);}
.consent-accept{background:var(--primary);color:#fff;font-weight:600;font-size:.78rem;
  padding:.5rem 1rem;border-radius:10px;border:none;cursor:pointer;flex-shrink:0;
  font-family:inherit;}
.consent-accept:hover{filter:brightness(1.07);}
@keyframes consentIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media (max-width: 540px){
  .consent-banner{flex-direction:column;align-items:stretch;gap:.5rem;}
  .consent-accept{align-self:flex-end;}
}

/* Cooperative viewer (logged-in member with role='viewer') — read-only.
   Drawer / pan / mode toolbars stay accessible but every editing affordance
   is greyed-out and pointer-events:none so nothing can be modified. */
body.coop-viewer #sketch,
body.coop-viewer .note-canvas,
body.coop-viewer .note-head,
body.coop-viewer .note textarea,
body.coop-viewer .resize-handle { pointer-events:none !important; }
body.coop-viewer #drawModeBtn,
body.coop-viewer #textModeBtn,
body.coop-viewer #noteModeBtn,
body.coop-viewer #addNoteBtn,
body.coop-viewer #clearSketch,
body.coop-viewer #resetBtn,
body.coop-viewer #importFile,
body.coop-viewer .vis-btn,
body.coop-viewer .d-acts,
body.coop-viewer .preset-btn,
body.coop-viewer #applySize { opacity:.45;pointer-events:none;cursor:not-allowed; }

/* Small read-only badge near the peers stack */
.readonly-pill{position:fixed;top:48px;left:50%;transform:translateX(-50%);z-index:37;
  display:none;align-items:center;gap:5px;padding:3px 10px;
  background:var(--surface);border:1px solid var(--border);border-radius:999px;
  box-shadow:var(--ssoft);font-size:.7rem;font-weight:600;color:var(--muted);
  backdrop-filter:blur(10px);}
body.coop-viewer .readonly-pill{display:flex;}
</style>
<script>
// Run before the main IIFE so the user never sees a flash of stale board/list data
// when opening a shared link (?board=<uuid>).
if (new URLSearchParams(location.search).get('board')) {
  document.documentElement.classList.add('pending-view');
}
</script>
</head>
<body>

<div id="viewport">
  <div id="board">
    <canvas class="draw-layer" id="sketch"></canvas>
    <div class="notes-layer" id="notesLayer"></div>
    <!-- Live cursors of cooperative peers — rides the board's pan transform -->
    <div class="cursors-layer" id="cursorsLayer"></div>
  </div>
</div>

<div class="clock hidden" id="clock">
  <div class="tl" id="timeLine">--:--</div>
  <div class="dl" id="dateLine"></div>
</div>
<div class="version">v.2.0.22</div>

<!-- Board pill: top-left, contains the saved-status dot inline as a child
     so it always hugs the pill regardless of board-name length. -->
<button class="board-pill" id="boardPill" type="button" title="Cambia board">
  <span class="bp-name" id="boardPillName">Board</span>
  <span class="bp-caret">▾</span>
</button>
<div class="status-badge" id="statusBadge"></div>

<!-- Drawer backdrop (closes the drawer on click) -->
<div class="drawer-backdrop" id="drawerBackdrop"></div>

<!-- v2.0: top-right cluster — share button + avatar / user-menu trigger.
     Mode buttons live in the bottom-center pill below. -->
<div class="corner">
  <button class="cbtn cbtn-share" id="shareBtn" type="button" title="Copia link board" aria-label="Condividi">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
  </button>
  <button class="cbtn" id="hamburger" type="button" aria-label="Menu utente">☰</button>
</div>

<!-- v2.0: persistent mode picker — always-visible floating pill at the bottom.
     Layout mirrors the prototype: cursor / pen | note / text | fullscreen. -->
<div class="mode-picker" id="modePicker">
  <button class="mp-btn" id="cursorModeBtn" title="Seleziona" type="button" aria-label="Seleziona">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l7.07 17 2.51-7.39L21 11.07z"/></svg>
  </button>
  <button class="mp-btn" id="drawModeBtn" title="Disegna" type="button">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
  </button>
  <span class="mp-sep"></span>
  <button class="mp-btn" id="noteModeBtn" title="Post-it" type="button">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M7 8h10M7 12h6"/></svg>
  </button>
  <button class="mp-btn" id="textModeBtn" title="Testo" type="button">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
  </button>
  <span class="mp-sep"></span>
  <button class="mp-btn" id="fullBtn" type="button" title="Schermo intero" aria-label="Fullscreen">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
  </button>
  <button class="mp-btn" id="boardSizeBtn" type="button" title="Dimensioni board" aria-label="Dimensioni board">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><rect x="2" y="4" width="20" height="13" rx="1.5"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
  </button>
</div>

<!-- Dimensioni board popover (v2.0) — opens from #boardSizeBtn -->
<div class="bs-pop" id="boardSizePop" hidden>
  <div class="bs-head">
    <button class="bs-frame-toggle" id="boardFrameToggle" type="button" title="Mostra/nascondi cornice" aria-label="Toggle cornice">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
    </button>
  </div>
  <div class="bs-presets" id="presetRow"></div>
  <div class="bs-inputs">
    <label class="bs-input">
      <span>W</span>
      <input type="number" id="boardW" min="400" max="4000" step="1"/>
    </label>
    <span class="bs-x">×</span>
    <label class="bs-input">
      <span>H</span>
      <input type="number" id="boardH" min="300" max="3000" step="1"/>
    </label>
  </div>
  <div class="bs-actions">
    <button class="bs-action" id="applySize" type="button" title="Applica">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
    </button>
    <button class="bs-action" id="centerBoard" type="button" title="Centra">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
    </button>
  </div>
</div>

<div class="drawer" id="drawer">

  <!-- ── Auth ── -->
  <div class="d-auth">
    <div id="authGuestRow" class="d-guest-row">
      <button class="d-google-btn" id="googleBtn" type="button" title="Sign in with Google">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
      </button>
      <button class="d-close-btn" id="drawerCloseGuest" type="button" title="Chiudi" aria-label="Chiudi">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="d-user-card" id="authUserRow" style="display:none;">
      <div class="auth-avatar" id="authAvatar"></div>
      <div class="d-user-info">
        <span class="d-uname" id="authUserName"></span>
        <span class="d-uemail" id="authUserEmail"></span>
      </div>
      <button class="d-close-btn" id="drawerCloseBtn" type="button" title="Chiudi" aria-label="Chiudi">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <!-- ── Big new-board button ── -->
  <button id="newBoardBtn" class="d-new-board" type="button" title="Nuova board" aria-label="Nuova board">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <!-- ── Boards ── -->
  <div class="d-sec d-sec-boards">
    <div id="boardsList"></div>
  </div>

  <!-- Board size moved to a popover above the toolbar (v2.0). -->


  <!-- ── Actions ── -->
  <div class="d-sec">
    <div style="display:flex;gap:6px;">
      <button class="dbtn" id="clockToggleBtn" type="button" title="Mostra/nascondi orologio">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>
      </button>
      <button class="dbtn" id="clearSketch" type="button" title="Cancella tutti i tratti">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13.5 9.5 4 4 9.5 14.5 20 20 13.5z"/><path d="M14 7 7 14"/><path d="M5 21h14"/></svg>
      </button>
      <button class="dbtn danger" id="resetBtn" type="button" title="Svuota la board">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>
    <div style="display:flex;gap:6px;margin-top:6px;">
      <button class="dbtn" id="exportBtn" type="button" title="Esporta board (JSON)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </button>
      <label class="dbtn" title="Importa board (JSON)" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <input type="file" id="importFile" accept=".json" style="display:none;"/>
      </label>
    </div>
  </div>

  <!-- ── Privacy / GDPR ── (visible to logged-in users only) -->
  <div class="d-sec d-gdpr" id="gdprSection" style="display:none;">
    <div style="display:flex;gap:6px;align-items:center;">
      <a class="dbtn d-policy-btn" href="./privacy.html" target="_blank" rel="noopener" title="Privacy policy">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </a>
      <button class="dbtn" id="exportAllBtn" type="button" title="Esporta tutti i miei dati (GDPR Art. 20)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      </button>
      <button class="dbtn danger" id="deleteAccountBtn" type="button" title="Elimina account">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </button>
    </div>
  </div>

  <!-- ── Footer (logout) — small, neutral, end of drawer ── -->
  <div class="d-footer" id="drawerFooter" style="display:none;">
    <button class="d-logout-btn" id="authLogoutBtn" type="button" title="Esci">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>Esci</span>
    </button>
  </div>

</div>

<!-- Note toolbar -->
<div class="toolbar" id="noteToolbar">
  <div id="noteColors" style="display:flex;gap:6px;align-items:center;"></div>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="addNoteBtn" type="button"
    style="background:var(--primary);color:#fff;border-radius:12px;font-size:1.2rem;border:none;">＋</button>
</div>

<!-- Draw toolbar -->
<div class="toolbar" id="drawToolbar">
  <button class="tb-btn active" id="penBtn" type="button">✏️</button>
  <button class="tb-btn" id="eraserBtn" type="button" title="Gomma">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3a1 1 0 0 1 0-1.4L13 5l6 6-9.3 9.3a1 1 0 0 1-.7.3H7"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
  </button>
  <div class="tb-sep"></div>
  <div id="penColors" style="display:flex;gap:5px;align-items:center;"></div>
  <div class="tb-sep" id="drawSep2"></div>
  <div class="vslider-wrap" id="drawSliderWrap">
    <div class="vslider-val" id="drawSliderVal">7</div>
    <div class="vslider-track" id="drawSliderTrack">
      <div class="vslider-fill" id="drawSliderFill"></div>
      <div class="vslider-thumb" id="drawSliderThumb"></div>
    </div>
    <!-- preview swatch moved out of the slider stack — kept hidden so the
         existing JS that writes to drawSliderPreview still works. -->
    <div class="vslider-preview" id="drawSliderPreview" style="display:none;"></div>
  </div>
</div>

<!-- Text toolbar -->
<div class="toolbar" id="textToolbar">
  <div id="txtColors" style="display:flex;gap:5px;align-items:center;"></div>
  <div class="tb-sep"></div>
  <div class="vslider-wrap" id="txtSliderWrap">
    <div class="vslider-val" id="txtSliderVal">15</div>
    <div class="vslider-track" id="txtSliderTrack">
      <div class="vslider-fill" id="txtSliderFill"></div>
      <div class="vslider-thumb" id="txtSliderThumb"></div>
    </div>
    <div class="vslider-preview" id="txtSliderPreview"
      style="display:none;font-weight:700;color:var(--primary);font-size:14px;">A</div>
  </div>
</div>

<!-- standalone fullscreen fab removed in v2.0.4 — moved into the mode picker -->
<div class="pan-ind" id="panInd"></div>

<!-- Peers (online users on cooperative board) -->
<div class="peers-stack" id="peersStack" aria-label="Utenti online"></div>
<div class="readonly-pill" aria-label="Sola lettura">👁 Sola lettura</div>

<div class="view-banner" id="viewBanner">
  <span style="opacity:.55;font-size:.9rem;">👁</span>
  <span class="view-banner-name" id="viewBoardName"></span>
  <button class="view-exit-btn" id="viewExitBtn" type="button" title="Exit view mode — open app">🏠</button>
</div>

<div class="confirm-pop" id="confirmPop">
  <p id="confirmMsg">Eliminare il post-it?</p>
  <div class="pop-row">
    <button class="pop-btn" id="confirmNo" type="button">Annulla</button>
    <button class="pop-btn danger" id="confirmYes" type="button">Elimina</button>
  </div>
</div>


<script type="module" src="./js/main.js"></script>
</body>
</html>
