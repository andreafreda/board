// ── F7 — Broadcast functions ──────────────────────────────
// All functions are no-ops if no channel is open or user not logged in.
let _lastNoteBroadcastMs = 0;
function broadcastNoteUpdate(id, x, y, w, h, updatedAt) {
  if (!_presenceChannel || !currentUser) return;
  const now = Date.now();
  if (now - _lastNoteBroadcastMs < 33) return; // 30 fps cap
  _lastNoteBroadcastMs = now;
  _presenceChannel.send({ type: 'broadcast', event: 'note:update',
    payload: { id, x, y, w, h, updatedAt, userId: currentUser.id } });
}
function broadcastNoteText(id, text, updatedAt) {
  if (!_presenceChannel || !currentUser) return;
  _presenceChannel.send({ type: 'broadcast', event: 'note:text',
    payload: { id, text, updatedAt, userId: currentUser.id } });
}
function broadcastNoteCreate(note) {
  if (!_presenceChannel || !currentUser) return;
  _presenceChannel.send({ type: 'broadcast', event: 'note:create',
    payload: { note, userId: currentUser.id } });
}
function broadcastNoteDelete(id) {
  if (!_presenceChannel || !currentUser) return;
  _presenceChannel.send({ type: 'broadcast', event: 'note:delete',
    payload: { id, userId: currentUser.id } });
}
function broadcastStrokePt(data) {
  if (!_presenceChannel || !currentUser) return;
  _presenceChannel.send({ type: 'broadcast', event: 'stroke:pt',
    payload: { ...data, userId: currentUser.id } });
}
function broadcastStrokeEnd(data) {
  if (!_presenceChannel || !currentUser) return;
  _presenceChannel.send({ type: 'broadcast', event: 'stroke:end',
    payload: { ...data, userId: currentUser.id } });
}

// ── F7 — Receive handlers ─────────────────────────────────
const _liveStrokes = new Map(); // strokeId → {points, color, size, eraser, type, noteId}

function handleNoteUpdate({ id, x, y, w, h, updatedAt }) {
  const app = window._boardApp;
  const note = app?.state.notes.find(n => n.id === id);
  if (!note) return;
  if (updatedAt && note.updatedAt && updatedAt < note.updatedAt) return; // last-write-wins
  note.x = x; note.y = y; note.w = w; note.h = h;
  if (updatedAt) note.updatedAt = updatedAt;
  const el = document.querySelector(`.note[data-id="${id}"]`);
  if (!el) return;
  el.style.left = x + 'px'; el.style.top = y + 'px';
  el.style.width = w + 'px'; el.style.height = h + 'px';
  // Resize + redraw note canvas
  const nc = el.querySelector('canvas.note-canvas');
  if (nc) {
    const dpr = window.devicePixelRatio || 1;
    const ch = h - 34;
    nc.width = Math.round(w * dpr); nc.height = Math.round(ch * dpr);
    nc.style.width = w + 'px'; nc.style.height = ch + 'px';
    const c = nc.getContext('2d');
    c.setTransform(dpr, 0, 0, dpr, 0, 0);
    c.lineCap = 'round'; c.lineJoin = 'round';
    (note.noteStrokes || []).forEach(s => {
      if (!s.points || s.points.length < 2) return;
      c.globalCompositeOperation = s.eraser ? 'destination-out' : 'source-over';
      c.strokeStyle = s.eraser ? 'rgba(0,0,0,1)' : (s.color || '#1f2328');
      c.lineWidth = s.size || 7;
      c.beginPath(); c.moveTo(s.points[0].x, s.points[0].y);
      s.points.slice(1).forEach(p => c.lineTo(p.x, p.y)); c.stroke();
    });
    c.globalCompositeOperation = 'source-over';
  }
}

function handleNoteText({ id, text, updatedAt }) {
  const app = window._boardApp;
  const note = app?.state.notes.find(n => n.id === id);
  if (!note) return;
  if (updatedAt && note.updatedAt && updatedAt < note.updatedAt) return;
  note.text = text;
  if (updatedAt) note.updatedAt = updatedAt;
  const ta = document.querySelector(`.note[data-id="${id}"] textarea`);
  if (ta && ta !== document.activeElement) ta.value = text;
}

function handleNoteCreate({ note }) {
  const app = window._boardApp;
  if (!app || !note?.id) return;
  if (app.state.notes.find(n => n.id === note.id)) return; // dedupe
  app.state.notes.push(note);
  const el = app.makeNoteEl?.(note);
  if (el) document.getElementById('notesLayer')?.appendChild(el);
}

function handleNoteDelete({ id }) {
  const app = window._boardApp;
  if (!app || !id) return;
  app.state.notes = app.state.notes.filter(n => n.id !== id);
  document.querySelector(`.note[data-id="${id}"]`)?.remove();
}

function handleStrokePt({ strokeId, type, noteId, x, y, color, size, eraser }) {
  let live = _liveStrokes.get(strokeId);
  if (!live) {
    live = { points: [], color, size, eraser, type, noteId };
    _liveStrokes.set(strokeId, live);
  }
  const prev = live.points[live.points.length - 1];
  live.points.push({ x, y });
  if (!prev) return; // need 2 points to draw a segment
  // Draw segment incrementally on the appropriate canvas
  let canvas = null;
  if (type === 'board') {
    canvas = document.getElementById('sketch');
  } else if (type === 'note' && noteId) {
    canvas = document.querySelector(`.note[data-id="${noteId}"] canvas.note-canvas`);
  }
  if (!canvas) return;
  const c = canvas.getContext('2d');
  c.lineCap = 'round'; c.lineJoin = 'round';
  c.globalCompositeOperation = eraser ? 'destination-out' : 'source-over';
  c.strokeStyle = eraser ? 'rgba(0,0,0,1)' : (color || '#1f2328');
  c.lineWidth = size || 7;
  c.beginPath(); c.moveTo(prev.x, prev.y); c.lineTo(x, y); c.stroke();
  c.globalCompositeOperation = 'source-over';
}

function handleStrokeEnd({ strokeId, type, noteId }) {
  const live = _liveStrokes.get(strokeId);
  if (!live) return;
  const app = window._boardApp;
  if (app && live.points.length >= 2) {
    // Commit to state so redrawBoard/redrawNoteCanvas stays consistent
    const stroke = { points: live.points, color: live.color, size: live.size, eraser: live.eraser };
    if (type === 'board') {
      app.state.strokes.push(stroke);
      _liveStrokes.delete(strokeId);
      app.redrawBoard(); // re-render with committed stroke
      return;
    } else if (type === 'note' && noteId) {
      const note = app.state.notes.find(n => n.id === noteId);
      if (note) {
        if (!note.noteStrokes) note.noteStrokes = [];
        note.noteStrokes.push(stroke);
        _liveStrokes.delete(strokeId);
        const nc = document.querySelector(`.note[data-id="${noteId}"] canvas.note-canvas`);
        if (nc) app.redrawNoteCanvas?.(nc, note);
        return;
      }
    }
  }
  _liveStrokes.delete(strokeId);
}

let sbSaveTimer = null;
let _sbRetryDelay = 0;
const _SB_MAX_RETRY = 30000;

async function doSbSave() {
  const app = window._boardApp;
  if (!currentUser || !app) return;
  setSyncStatus('saving');
  try {
    const client = await getClient();
    app.syncActiveBoard();
    const b = app.state.boards.find(bd => bd.id === app.state.activeBoardId);
    if (!b) return;
    const ts = new Date().toISOString();
    const isOwnerBoard = !b.ownerId || b.ownerId === currentUser.id;

    // ── Board metadata (owner only) ─────────────────────────
    if (isOwnerBoard) {
      const { error: be } = await client.from('boards').upsert({
        id: b.id, owner_id: currentUser.id,
        name: b.name, width: b.width, height: b.height,
        visibility: b.visibility || 'private',
        updated_at: ts,
      });
      if (be) console.warn('doSbSave boards upsert:', be.message);
    }

    // ── Notes upsert ────────────────────────────────────────
    // Always use board owner_id so the owner can SELECT via notes_all_owner.
    // Guests upsert with owner_id = board_owner_id; notes_write_editor allows it.
    const notesOwnerId = b.ownerId || currentUser.id;

    if (b.notes.length > 0) {
      const { error: ne } = await client.from('notes').upsert(
        b.notes.map(n => ({ id: n.id, board_id: b.id, owner_id: notesOwnerId, data: n, updated_at: ts }))
      );
      if (ne) console.warn('doSbSave notes upsert:', ne.message);
    }

    // ── Notes delete (owner only) ───────────────────────────
    // Guests must NOT delete notes from DB: their local state may be missing notes
    // created by the owner or other collaborators after the guest last synced.
    // Only the owner has an authoritative view of which notes should exist.
    if (isOwnerBoard) {
      const { data: existing } = await client.from('notes').select('id').eq('board_id', b.id);
      const curIds = new Set(b.notes.map(n => n.id));
      const toDelete = (existing || []).map(r => r.id).filter(id => !curIds.has(id));
      if (toDelete.length) {
        const { error: de } = await client.from('notes').delete().in('id', toDelete);
        if (de) console.warn('doSbSave notes delete:', de.message);
      }
    }

    // ── Strokes (owner only) ────────────────────────────────
    // The strokes table stores ONE row per board (full array, last-write-wins).
    // If both owner and guest save independently, the later save overwrites the
    // earlier one — and whichever save is missing strokes from the other user
    // will silently delete them from the DB.
    // Fix: only the board owner writes to the strokes row. The owner receives
    // guest strokes via broadcast (handleStrokeEnd), accumulates them in
    // state.strokes, and persists the unified array on their next save.
    // Guests broadcast their strokes for live sync but do NOT write to DB.
    if (isOwnerBoard) {
      const { error: se } = await client.from('strokes').upsert({
        id: b.id, board_id: b.id, owner_id: currentUser.id,
        data: b.strokes, updated_at: ts,
      });
      if (se) console.warn('doSbSave strokes upsert:', se.message);
    }

    setSyncStatus('saved');
    _sbRetryDelay = 0; // reset backoff on success
  } catch (err) {
    console.warn('doSbSave failed:', err?.message ?? err);
    setSyncStatus('offline');
    // Exponential backoff retry (2s → 4s → 8s → … → 30s max)
    _sbRetryDelay = _sbRetryDelay ? Math.min(_sbRetryDelay * 2, _SB_MAX_RETRY) : 2000;
    sbSaveTimer = setTimeout(doSbSave, _sbRetryDelay);
  }
}

function scheduleSbSave() {
  setSyncStatus('saving');
  clearTimeout(sbSaveTimer);
  sbSaveTimer = setTimeout(doSbSave, 1500);
}

// ── Auth render ───────────────────────────────────────────
const GOOGLE_SVG = `<svg width="20" height="20" viewBox="0 0 24 24">
  <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
  <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
  <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
  <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
</svg>`;

async function renderAuth(session) {
  const app = window._boardApp;

  if (session?.user) {
    currentUser = session.user;
    const meta   = session.user.user_metadata ?? {};
    const name   = meta.full_name ?? meta.name ?? meta.user_name
                 ?? session.user.email?.split('@')[0] ?? '?';
    const avatar = meta.avatar_url ?? meta.picture ?? null;

    guestRow.style.display = 'none';
    userRow.style.display  = 'flex';
    avatarEl.innerHTML = avatar
      ? `<img src="${avatar}" alt="" style="width:100%;height:100%;border-radius:999px;object-fit:cover;">`
      : name.charAt(0).toUpperCase();
    const nameEl = document.getElementById('authUserName');
    if (nameEl) nameEl.textContent = name;

    if (app) {
      app.currentUser         = currentUser;
      app.scheduleSbSave      = scheduleSbSave;
      app.sbCreateBoard       = sbCreateBoard;
      app.sbDeleteBoard       = sbDeleteBoardFn;
      app.sbUpdateBoardName   = sbUpdateBoardName;
      app.sbUpdateVisibility  = updateBoardVisibility;
      app.sbAddMember          = sbAddMember;
      app.sbRemoveMember       = sbRemoveMember;
      app.sbUpdateMemberRole   = sbUpdateMemberRole;
      app.refreshMembers       = refreshMembers;
      app.joinPresenceChannel  = joinPresenceChannel;
      app.leavePresenceChannel = leavePresenceChannel;
      app.broadcastNoteUpdate  = broadcastNoteUpdate;
      app.broadcastNoteText    = broadcastNoteText;
      app.broadcastNoteCreate  = broadcastNoteCreate;
      app.broadcastNoteDelete  = broadcastNoteDelete;
      app.broadcastStrokePt    = broadcastStrokePt;
      app.broadcastStrokeEnd   = broadcastStrokeEnd;
    }

    // Load boards from Supabase, preserving any offline guest work first
    try {
      const client = await getClient();

      // ── Step 1: upsert the current guest board if it has content ──
      // This handles BOTH first-login and returning-user-with-offline-edits scenarios.
      // We always push local content to Supabase before loading, so offline edits
      // are never lost regardless of whether the user has existing cloud boards.
      let savedGuestBoardId = null;
      if (app) {
        app.syncActiveBoard?.();
        const gb = app.state.boards?.find(b => b.id === app.state.activeBoardId)
                || app.state.boards?.[0];
        const hasContent = gb && ((gb.notes?.length > 0) || (gb.strokes?.length > 0));
        if (hasContent) {
          savedGuestBoardId = gb.id;
          const ts = new Date().toISOString();
          // upsert: insert if new board, update if returning user's board
          await client.from('boards').upsert({
            id: gb.id, owner_id: session.user.id,
            name: gb.name || 'Board', width: gb.width || 1366, height: gb.height || 768,
            updated_at: ts,
          });
          if (gb.notes.length) {
            await client.from('notes').upsert(
              gb.notes.map(n => ({
                id: n.id, board_id: gb.id, owner_id: session.user.id, data: n, updated_at: ts,
              }))
            );
          }
          await client.from('strokes').upsert({
            id: gb.id, board_id: gb.id, owner_id: session.user.id,
            data: gb.strokes || [], updated_at: ts,
          });
        }
      }

      // ── Step 2: load all boards (now includes the just-saved guest board) ──
      let boards = await sbLoadBoards(client);
      if (!boards?.length) {
        // Empty account with empty guest board: create a fresh default board
        const d = app?.mkBoard?.() ?? {
          id: crypto.randomUUID(), name: 'Board',
          width: 1366, height: 768, panX: 0, panY: 0, notes: [], strokes: [],
        };
        await client.from('boards').insert({
          id: d.id, owner_id: session.user.id,
          name: d.name, width: d.width, height: d.height,
        });
        boards = [d];
      }

      if (app) {
        // Prefer: 1) just-saved guest board (offline work), 2) last board from prefs, 3) boards[0]
        let lastActiveBoardId = null;
        try { lastActiveBoardId = JSON.parse(localStorage.getItem('board-lite-v10-prefs') || '{}').activeBoardId ?? null; } catch {}
        const preferredId = savedGuestBoardId || lastActiveBoardId || null;
        const active = boards.find(b => b.id === preferredId) || boards[0];
        app.state.boards = boards;
        // If the URL had ?board=uuid (e.g. invite link), switch directly to that
        // board if it's now accessible (claimPendingMemberships may have just activated it)
        const urlBoardId = new URLSearchParams(location.search).get('board');
        const urlBoard = urlBoardId ? boards.find(b => b.id === urlBoardId) : null;
        const chosen = urlBoard || active;
        // Clean up the URL param now that we've handled it
        if (urlBoardId) history.replaceState(null, '', location.pathname);

        app.state.activeBoardId = chosen.id;
        app.loadBoardIntoState(chosen);
        app.applyBoardSize(chosen.width, chosen.height);
        app.renderBoardList();
        // Join presence channel if board is shared
        if (chosen.visibility === 'public' || chosen.visibility === 'cooperative') {
          joinPresenceChannel(chosen.id);
        }
      }
    } catch (err) {
      console.error('Supabase board load failed:', err);
      if (app) app.renderBoardList();
    }

  } else {
    currentUser = null;
    userRow.style.display  = 'none';
    guestRow.style.display = '';
    googleBtn.disabled = false;
    googleBtn.innerHTML = GOOGLE_SVG;

    if (app) {
      // On logout: clear bridge functions first, then wipe cloud state.
      // We do NOT carry cloud boards to the guest session (privacy).
      app.currentUser        = null;
      app.scheduleSbSave     = null;
      app.sbCreateBoard      = null;
      app.sbDeleteBoard      = null;
      app.sbUpdateBoardName  = null;
      app.sbUpdateVisibility = null;
      app.sbAddMember          = null;
      app.sbRemoveMember       = null;
      app.sbUpdateMemberRole   = null;
      app.refreshMembers       = null;
      app.joinPresenceChannel  = null;
      app.leavePresenceChannel = null;
      app.broadcastNoteUpdate  = null;
      app.broadcastNoteText    = null;
      app.broadcastNoteCreate  = null;
      app.broadcastNoteDelete  = null;
      app.broadcastStrokePt    = null;
      app.broadcastStrokeEnd   = null;
      await leavePresenceChannel();

      // Start fresh: a blank guest board — cloud data stays in Supabase only.
      const freshBoard = app.mkBoard?.() ?? {
        id: crypto.randomUUID(), name: 'Board',
        width: 1366, height: 768, panX: 0, panY: 0, notes: [], strokes: [],
      };
      const freshState = { boards: [freshBoard], activeBoardId: freshBoard.id };
      try { localStorage.setItem('board-lite-v10', JSON.stringify(freshState)); } catch {}
      app.state.boards = [freshBoard];
      app.state.activeBoardId = freshBoard.id;
      app.loadBoardIntoState(freshBoard);
      app.applyBoardSize(freshBoard.width, freshBoard.height);
      app.renderBoardList();
    }
  }
}

// ── Login Google (popup) ──────────────────────────────────
googleBtn.addEventListener('click', async () => {
  googleBtn.disabled = true;
  googleBtn.innerHTML = '<span class="auth-spinner"></span>';
  try {
    const client     = await getClient();
    const redirectTo = window.location.href.split('?')[0].split('#')[0];
    const { data, error } = await client.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo, skipBrowserRedirect: true },
    });
    if (error || !data?.url) throw error ?? new Error();
    const popup = window.open(
      data.url, 'sb-oauth',
      'width=520,height=640,popup=yes,left=' +
        Math.round(window.screenX + (window.outerWidth  - 520) / 2) +
        ',top='  + Math.round(window.screenY + (window.outerHeight - 640) / 2)
    );
    if (!popup) { window.location.href = data.url; return; }
    const iv = setInterval(async () => {
      if (!popup.closed) return;
      clearInterval(iv);
      const { data: { session } } = await (await getClient()).auth.getSession();
      await renderAuth(session);
    }, 600);
  } catch {
    await renderAuth(null);
  }
});

logoutBtn.addEventListener('click', async () => {
  (await getClient()).auth.signOut();
});

// ── Bootstrap ─────────────────────────────────────────────
(async () => {
  const urlBoard = new URLSearchParams(location.search).get('board');

  try {
    const client = await getClient();

    if (urlBoard) {
      // Peek at visibility before deciding the routing strategy.
      // RLS: anon can read public boards, so a private/cooperative board returns null here.
      const { data: meta } = await client.from('boards')
        .select('id,visibility').eq('id', urlBoard).maybeSingle();

      if (meta?.visibility === 'public') {
        // Public board → view mode (no auth setup needed)
        await loadPublicBoard(urlBoard);
        return;
      }
      // Cooperative board OR truly inaccessible (private/deleted).
      // Cannot distinguish the two as anon — cooperative boards are RLS-invisible
      // to unauthenticated users just like private ones.
      // Do NOT strip the URL: if the user logs in and is a member,
      // renderAuth will switch to this board after loading boards.
    }

    // Normal auth flow
    const { data: { session } } = await client.auth.getSession();
    if (window.opener && session) { window.close(); return; }
    await renderAuth(session);
    client.auth.onAuthStateChange(async (_e, session) => renderAuth(session));
  } catch {
    await renderAuth(null);
  }
})();
