<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Board</title>
<style>
:root{
  --bg:#f6f4ee;--board:#fffaf0;--grid:rgba(31,35,40,.06);
  --text:#1f2328;--muted:#70757d;--border:rgba(31,35,40,.12);
  --surface:rgba(255,255,255,.95);--shadow:0 12px 28px rgba(31,35,40,.13);
  --ssoft:0 4px 12px rgba(31,35,40,.07);--primary:#0f6f76;--danger:#d94848;
}
[data-theme="dark"]{
  --bg:#111315;--board:#23262b;--grid:rgba(255,255,255,.07);
  --text:#eef2f7;--muted:#a9b1bb;--border:rgba(255,255,255,.12);
  --surface:rgba(30,32,36,.97);--shadow:0 14px 34px rgba(0,0,0,.35);
  --ssoft:0 4px 12px rgba(0,0,0,.22);--primary:#66c2c8;--danger:#ff7c7c;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
button,textarea,input{font:inherit;color:inherit;border:none;background:none;cursor:pointer;}
:focus-visible{outline:2px solid var(--primary);outline-offset:2px;}

/* Viewport */
#viewport{position:fixed;inset:0;overflow:hidden;background:var(--bg);}

/* Board */
#board{
  position:absolute;top:0;left:0;
  width:1366px;height:768px;
  background:
    linear-gradient(to right,var(--grid) 1px,transparent 1px),
    linear-gradient(to bottom,var(--grid) 1px,transparent 1px),
    var(--board);
  background-size:34px 34px,34px 34px,auto;
  transform-origin:0 0;touch-action:none;user-select:none;
}

/* Auth card */
.d-auth{padding:.35rem 0 .55rem;border-bottom:1px solid var(--border);margin-bottom:.1rem;}
.d-google-btn{width:100%;height:46px;border-radius:14px;
  border:1px solid var(--border);background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--ssoft);transition:box-shadow .15s,transform .15s;}
.d-google-btn:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
.d-google-btn:active{transform:translateY(0);}
.d-user-card{display:flex;align-items:center;gap:10px;padding:.42rem .5rem;
  border-radius:14px;
  background:color-mix(in srgb,var(--primary) 9%,transparent);
  border:1px solid color-mix(in srgb,var(--primary) 22%,transparent);}
.auth-avatar{width:34px;height:34px;border-radius:999px;
  background:var(--primary);color:#fff;display:grid;place-items:center;
  font-size:.82rem;font-weight:700;flex-shrink:0;overflow:hidden;}
.d-uname{flex:1;font-size:.79rem;font-weight:600;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
.d-logout-btn{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
  font-size:.88rem;border:1px solid var(--border);background:var(--surface);
  opacity:.6;transition:opacity .15s,color .15s;flex-shrink:0;}
.d-logout-btn:hover{opacity:1;color:var(--danger);}
.auth-spinner{width:18px;height:18px;border-radius:999px;
  border:2px solid var(--border);border-top-color:var(--primary);
  animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Board list in drawer */
.d-sec{padding:.42rem 0;border-top:1px solid var(--border);}
.d-sec-label{font-size:.68rem;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.05em;padding:.05rem .35rem .3rem;}
.d-boards-hdr{display:flex;align-items:center;justify-content:flex-end;
  min-height:22px;margin-bottom:.3rem;}
#newBoardBtn{width:26px;height:26px;border-radius:8px;font-size:.95rem;font-weight:700;
  border:1px solid var(--border);background:var(--surface);
  display:none;place-items:center;}
#newBoardBtn:hover{background:color-mix(in srgb,var(--primary) 12%,var(--surface));}
.d-board{display:flex;align-items:center;gap:6px;padding:.3rem .35rem;
  border-radius:10px;cursor:pointer;border:1px solid transparent;transition:background .1s;}
.d-board:hover{background:color-mix(in srgb,var(--border) 42%,transparent);}
.d-board.active{background:color-mix(in srgb,var(--primary) 10%,transparent);
  border-color:color-mix(in srgb,var(--primary) 22%,transparent);}
.d-board.local{cursor:default;}
.d-board.local:hover{background:color-mix(in srgb,var(--primary) 6%,transparent);}
.d-dot{width:7px;height:7px;border-radius:999px;background:var(--muted);
  opacity:.3;flex-shrink:0;transition:opacity .1s,background .1s;}
.d-board.active .d-dot{background:var(--primary);opacity:1;}
.d-bname{flex:1;font-size:.82rem;font-weight:500;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
.d-acts{display:flex;gap:1px;opacity:0;transition:opacity .12s;flex-shrink:0;}
.d-board:hover .d-acts,.d-board.active .d-acts{opacity:1;}
.d-bib{width:22px;height:22px;border-radius:6px;font-size:.68rem;
  display:grid;place-items:center;border:none;background:transparent;
  color:var(--muted);transition:background .1s,color .1s;}
.d-bib:hover{background:color-mix(in srgb,var(--border) 65%,transparent);color:var(--text);}
.d-bib.del:hover{color:var(--danger);}
.d-binp{flex:1;font-size:.82rem;border-radius:7px;
  border:1px solid var(--primary);background:var(--surface);
  padding:0 5px;height:26px;color:var(--text);outline:none;min-width:0;}

/* Clock */
.clock{position:fixed;top:10px;left:10px;z-index:30;
  padding:.28rem .6rem;border-radius:11px;background:var(--surface);
  border:1px solid var(--border);box-shadow:var(--ssoft);
  user-select:none;backdrop-filter:blur(10px);line-height:1.3;}
.clock .tl{font-size:.8rem;font-weight:700;}
.clock .dl{font-size:.66rem;opacity:.65;}
.clock.hidden{display:none;}
.version{position:fixed;top:62px;left:10px;z-index:29;
  font-size:.58rem;color:var(--muted);opacity:.55;
  user-select:none;pointer-events:none;padding:0 2px;}

/* Presence avatars */
.presence-stack{position:fixed;top:10px;right:10px;z-index:39;
  display:flex;align-items:center;gap:0;flex-direction:row-reverse;}
.presence-stack.hidden{display:none;}
.pav{width:34px;height:34px;border-radius:999px;
  border:2.5px solid var(--bg);
  display:grid;place-items:center;
  font-size:.75rem;font-weight:700;color:#fff;
  cursor:default;transition:transform .15s,z-index 0s;
  margin-left:-8px;position:relative;}
.pav:hover{transform:translateY(-3px) scale(1.08);z-index:5;}
.pav:first-child{margin-left:0;}
.pav-more{background:color-mix(in srgb,var(--muted) 70%,var(--surface));
  color:var(--text);font-size:.65rem;font-weight:700;}
/* tooltip via title — native browser handles it */

/* Corner */
.corner{position:fixed;top:10px;right:10px;z-index:40;display:flex;gap:6px;}
.cbtn{width:44px;height:44px;border-radius:14px;border:1px solid var(--border);
  background:var(--surface);box-shadow:var(--ssoft);
  display:grid;place-items:center;font-size:1.05rem;font-weight:700;
  backdrop-filter:blur(10px);}
.cbtn.on{background:color-mix(in srgb,var(--primary) 16%,var(--surface));
  border-color:color-mix(in srgb,var(--primary) 45%,transparent);
  box-shadow:0 0 0 2px color-mix(in srgb,var(--primary) 20%,transparent),var(--ssoft);}

/* Drawer */
.drawer{position:fixed;top:62px;right:10px;z-index:45;
  width:min(300px,calc(100vw - 20px));
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;box-shadow:var(--shadow);padding:.6rem;
  display:none;backdrop-filter:blur(18px);
  max-height:calc(100dvh - 80px);overflow-y:auto;}
.drawer.open{display:block;animation:drawerIn .17s cubic-bezier(.22,.5,.36,1);}
@keyframes drawerIn{from{opacity:0;transform:translateY(-7px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.dsec{padding:.38rem 0;border-bottom:1px solid var(--border);display:grid;gap:.4rem;}
.dsec:last-child{border-bottom:0;}
.drow{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.dbtn{min-height:42px;border-radius:13px;border:1px solid var(--border);
  background:var(--surface);font-size:.84rem;}
.dbtn.danger{color:var(--danger);}
.preset-row{display:flex;flex-wrap:wrap;gap:5px;}
.preset-btn{padding:.3rem .6rem;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);font-size:.76rem;font-weight:600;}
.preset-btn.active{background:var(--primary);color:#fff;border-color:transparent;}
.size-inputs{display:grid;grid-template-columns:1fr auto 1fr;gap:5px;align-items:center;}
.size-inputs input[type=number]{width:100%;min-height:36px;border-radius:9px;
  border:1px solid var(--border);background:var(--surface);padding:0 6px;
  font-size:.84rem;text-align:center;}
.size-inputs span{font-size:.8rem;text-align:center;color:var(--muted);}

/* Toolbars */
.toolbar{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);
  z-index:50;display:none;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:999px;padding:8px 14px;
  box-shadow:var(--shadow);backdrop-filter:blur(16px);
  white-space:nowrap;height:52px;overflow:visible;}
.toolbar.visible{display:flex;}
.tb-sep{width:1px;height:24px;background:var(--border);margin:0 2px;align-self:center;}
.tb-btn{width:36px;height:36px;border-radius:999px;border:2px solid transparent;
  display:grid;place-items:center;font-size:.9rem;align-self:center;}
.tb-btn.active{border-color:var(--primary);
  background:color-mix(in srgb,var(--primary) 14%,transparent);}
.tb-dot{border-radius:999px;border:2px solid transparent;flex:0 0 auto;cursor:pointer;align-self:center;}
.tb-dot.active{border-color:var(--text);}

/* Vertical slider */
.vslider-wrap{position:relative;display:flex;flex-direction:column;align-items:center;
  gap:4px;cursor:ns-resize;user-select:none;touch-action:none;
  margin-top:-90px;background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:6px 8px 4px;box-shadow:var(--ssoft);}
.vslider-track{width:8px;height:72px;
  background:color-mix(in srgb,var(--border) 80%,transparent);
  border-radius:999px;position:relative;}
.vslider-fill{position:absolute;bottom:0;left:0;right:0;border-radius:999px;background:var(--primary);}
.vslider-thumb{position:absolute;left:50%;transform:translate(-50%,-50%);
  width:20px;height:20px;border-radius:999px;
  background:var(--surface);border:2px solid var(--primary);
  box-shadow:0 2px 8px rgba(0,0,0,.18);}
.vslider-val{font-size:.65rem;font-weight:700;color:var(--primary);}
.vslider-preview{width:32px;height:32px;border-radius:999px;
  display:flex;align-items:center;justify-content:center;}

/* Fullscreen */
.fab-fs{position:fixed;bottom:10px;right:10px;z-index:41;
  width:42px;height:42px;border-radius:13px;background:var(--surface);
  border:1px solid var(--border);box-shadow:var(--ssoft);
  display:grid;place-items:center;font-size:1.1rem;backdrop-filter:blur(10px);}

/* Confirm popup */
.confirm-pop{position:fixed;z-index:60;background:var(--surface);
  border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);
  padding:.8rem 1rem;display:none;flex-direction:column;gap:.6rem;
  min-width:200px;backdrop-filter:blur(16px);animation:popIn .15s ease;}
.confirm-pop.open{display:flex;}
@keyframes popIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.confirm-pop p{margin:0;font-size:.88rem;font-weight:600;}
.confirm-pop .pop-row{display:flex;gap:8px;}
.confirm-pop .pop-btn{flex:1;min-height:38px;border-radius:11px;
  border:1px solid var(--border);background:var(--surface);font-size:.84rem;font-weight:600;}
.confirm-pop .pop-btn.danger{background:var(--danger);color:#fff;border-color:transparent;}

/* Pan indicator */
.pan-ind{position:fixed;bottom:10px;left:10px;z-index:35;
  font-size:.65rem;color:var(--muted);opacity:0;transition:opacity .4s;
  background:color-mix(in srgb,var(--surface) 88%,transparent);
  border:1px solid var(--border);border-radius:999px;padding:.2rem .5rem;
  pointer-events:none;}
.pan-ind.show{opacity:1;}

/* Notes layer */
.notes-layer{position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;}

/* Cursors layer (remote users) */
#cursorsLayer{position:absolute;inset:0;pointer-events:none;z-index:5;overflow:visible;}
.remote-cursor{position:absolute;pointer-events:none;
  display:flex;flex-direction:column;align-items:flex-start;gap:1px;
  opacity:1;transition:left .06s linear,top .06s linear,opacity .3s;}
.remote-cursor.fading{opacity:0;}
.cursor-label{font-size:.62rem;font-weight:700;color:#fff;
  padding:.08rem .28rem;border-radius:4px;white-space:nowrap;
  margin-top:1px;margin-left:10px;
  box-shadow:0 1px 3px rgba(0,0,0,.25);}

/* Draw layer */
.draw-layer{position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;z-index:1;background:transparent;}
.draw-layer.on{pointer-events:auto;cursor:crosshair;}
.draw-layer.eraser-on{cursor:cell;}

/* View mode banner */
.view-banner{position:fixed;bottom:58px;left:50%;transform:translateX(-50%);z-index:50;
  display:none;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border);border-radius:999px;
  padding:.32rem 1rem;box-shadow:var(--shadow);backdrop-filter:blur(14px);
  white-space:nowrap;max-width:calc(100vw - 40px);}
.view-banner.on{display:flex;}
.view-banner-name{font-size:.8rem;font-weight:600;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.view-exit-btn{width:28px;height:28px;border-radius:8px;flex-shrink:0;
  display:grid;place-items:center;font-size:.85rem;
  border:1px solid var(--border);background:var(--surface);
  opacity:.7;transition:opacity .15s,background .12s;}
.view-exit-btn:hover{opacity:1;background:color-mix(in srgb,var(--primary) 8%,var(--surface));}

/* Visibility badge */
.vis-btn{width:22px;height:22px;border-radius:6px;font-size:.72rem;
  display:grid;place-items:center;border:none;background:transparent;
  opacity:.35;transition:background .1s,color .1s,opacity .1s;flex-shrink:0;}
.d-board:hover .vis-btn,.d-board.active .vis-btn{opacity:.75;}
.vis-btn.pub{opacity:1;color:var(--primary);}
.vis-btn:hover{opacity:1!important;background:color-mix(in srgb,var(--border) 65%,transparent);}

/* Members section */
.d-member-item{display:flex;align-items:center;gap:7px;
  padding:.24rem .35rem;border-radius:8px;transition:background .1s;}
.d-member-item:hover{background:color-mix(in srgb,var(--border) 35%,transparent);}
.d-member-avatar{width:24px;height:24px;border-radius:999px;
  background:var(--primary);color:#fff;font-size:.65rem;font-weight:700;
  display:grid;place-items:center;flex-shrink:0;}
.d-member-email{flex:1;font-size:.74rem;color:var(--muted);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
.d-member-role{font-size:.7rem;padding:.08rem .28rem;border-radius:5px;
  flex-shrink:0;cursor:pointer;
  border:1px solid color-mix(in srgb,var(--border) 80%,transparent);
  background:color-mix(in srgb,var(--border) 40%,transparent);
  transition:background .1s,color .1s,border-color .1s;}
.d-member-role:hover{background:color-mix(in srgb,var(--primary) 12%,transparent);
  border-color:color-mix(in srgb,var(--primary) 28%,transparent);}
.d-member-role.editor{color:var(--primary);}
.d-member-role.viewer{color:var(--muted);}
.d-member-loading{font-size:.75rem;color:var(--muted);padding:.25rem .35rem;opacity:.55;}
.d-invite-row{display:flex;gap:5px;margin-top:.4rem;}
.d-invite-inp{flex:1;min-height:30px;border-radius:8px;
  border:1px solid var(--border);background:var(--surface);
  padding:0 8px;font-size:.78rem;color:var(--text);outline:none;
  transition:border-color .15s;}
.d-invite-inp:focus{border-color:var(--primary);}
.d-invite-btn{width:30px;height:30px;border-radius:8px;flex-shrink:0;
  border:1px solid color-mix(in srgb,var(--primary) 30%,transparent);
  background:color-mix(in srgb,var(--primary) 8%,transparent);
  color:var(--primary);font-size:1rem;font-weight:700;
  display:grid;place-items:center;transition:background .12s;}
.d-invite-btn:hover{background:color-mix(in srgb,var(--primary) 18%,transparent);}

/* Share link row */
.d-share-row{display:flex;gap:6px;padding:.1rem .35rem .2rem;}
.d-copy-btn{flex:1;min-height:30px;border-radius:9px;border:1px solid var(--border);
  background:var(--surface);font-size:.8rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:background .12s,border-color .12s,color .12s;}
.d-copy-btn:hover{background:color-mix(in srgb,var(--primary) 7%,var(--surface));
  border-color:color-mix(in srgb,var(--primary) 30%,transparent);}
.d-copy-btn.copied{color:var(--primary);border-color:color-mix(in srgb,var(--primary) 40%,transparent);}

/* Note */
.note{pointer-events:auto;position:absolute;border-radius:15px 15px 18px 15px;
  box-shadow:0 10px 22px rgba(0,0,0,.13);border:1px solid rgba(0,0,0,.08);
  padding:1.1rem .75rem .6rem;display:flex;flex-direction:column;
  transform:rotate(var(--rot,0deg));min-width:120px;min-height:100px;}
.note::before{content:'';position:absolute;top:9px;left:12px;width:36px;height:7px;
  border-radius:999px;background:rgba(255,255,255,.68);}
.note.text-active{box-shadow:0 0 0 2.5px var(--primary),0 10px 22px rgba(0,0,0,.13);}
.note-head{position:absolute;inset:0 0 auto 0;height:34px;z-index:5;
  display:flex;align-items:center;justify-content:flex-end;
  padding:5px 7px 0 0;gap:5px;cursor:grab;}
.note.dragging .note-head{cursor:grabbing;}
.mini-btn{width:28px;height:28px;border-radius:999px;
  background:rgba(255,255,255,.82);box-shadow:0 1px 5px rgba(0,0,0,.08);
  display:grid;place-items:center;color:#4b5563;font-size:.95rem;}
.note textarea{width:100%;flex:1;border:0;outline:0;background:transparent;
  resize:none;padding-top:.3rem;line-height:1.4;pointer-events:none;}
.note textarea.editable{pointer-events:auto;}
.resize-handle{position:absolute;right:0;bottom:0;width:22px;height:22px;
  cursor:se-resize;z-index:5;display:flex;align-items:flex-end;
  justify-content:flex-end;padding:4px;}
.resize-handle::after{content:'';display:block;width:10px;height:10px;
  border-right:2px solid rgba(0,0,0,.22);border-bottom:2px solid rgba(0,0,0,.22);
  border-radius:0 0 4px 0;}
.note-canvas{position:absolute;top:34px;left:0;right:0;bottom:0;
  width:100%;height:calc(100% - 34px);
  pointer-events:none;border-radius:0 0 inherit inherit;z-index:4;}
.note-canvas.draw-on{pointer-events:auto;cursor:crosshair;}
.note-canvas.eraser-on{pointer-events:auto;cursor:cell;}

/* Sync status badge */
.sync-badge{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
  z-index:30;font-size:.63rem;padding:.15rem .5rem;border-radius:999px;
  display:flex;align-items:center;gap:4px;pointer-events:none;
  background:var(--surface);border:1px solid var(--border);
  box-shadow:var(--ssoft);opacity:0;transition:opacity .4s;}
.sync-badge.show{opacity:1;}
.sync-dot{width:6px;height:6px;border-radius:999px;flex-shrink:0;}
.sync-badge.saved  .sync-dot{background:#4fa84f;}
.sync-badge.saving .sync-dot{background:#c8a020;}
.sync-badge.offline .sync-dot{background:#e05c5c;}
.sync-toast{position:fixed;bottom:54px;left:50%;transform:translateX(-50%);
  z-index:55;font-size:.78rem;font-weight:600;
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:.4rem .85rem;box-shadow:var(--shadow);
  pointer-events:none;opacity:0;transition:opacity .3s;}
.sync-toast.show{opacity:1;}
</style>
</head>
<body>

<div id="viewport">
  <div id="board">
    <canvas class="draw-layer" id="sketch"></canvas>
    <div class="notes-layer" id="notesLayer"></div>
    <div id="cursorsLayer"></div>
  </div>
</div>

<div class="clock hidden" id="clock">
  <div class="tl" id="timeLine">--:--</div>
  <div class="dl" id="dateLine"></div>
</div>
<div class="version">v.1.2.1</div>

<div class="presence-stack hidden" id="presenceStack"></div>

<div class="corner">
  <button class="cbtn" id="textModeBtn" title="Testo" type="button">T</button>
  <button class="cbtn" id="drawModeBtn" title="Lavagna" type="button">✏️</button>
  <button class="cbtn" id="noteModeBtn" title="Post-it" type="button">🗒️</button>
  <button class="cbtn" id="hamburger" type="button">☰</button>
</div>

<div class="drawer" id="drawer">

  <!-- ── Auth ── -->
  <div class="d-auth">
    <div id="authGuestRow">
      <button class="d-google-btn" id="googleBtn" type="button" title="Sign in with Google">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">

          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>

  <!-- ── Boards ── -->
  <div class="d-sec">

             title="Add member by email" autocomplete="off" spellcheck="false"/>

  <!-- ── Board size ── -->

      <button class="dbtn" id="clearSketch" type="button" title="Clear drawings" style="flex:1;font-size:1.15rem;">🧹</button>

        <input type="file" id="importFile" accept=".json" style="display:none;"/>

</div>

<!-- Text toolbar -->
<div class="toolbar" id="textToolbar">
  <div id="txtColors" style="display:flex;gap:5px;align-items:center;"></div>
  <div class="tb-sep"></div>

    <div class="vslider-track" id="txtSliderTrack">
      <div class="vslider-fill" id="txtSliderFill"></div>

      style="font-weight:700;color:var(--primary);font-size:14px;">A</div>

<div class="sync-badge" id="syncBadge"><div class="sync-dot"></div><span id="syncLabel">Saved</span></div>
<div class="sync-toast" id="syncToast"></div>

<div class="view-banner" id="viewBanner">
  <span style="opacity:.55;font-size:.9rem;">👁</span>
  <span class="view-banner-name" id="viewBoardName"></span>
  <button class="view-exit-btn" id="viewExitBtn" type="button" title="Exit view mode — open app">🏠</button>
</div>

<div class="confirm-pop" id="confirmPop">
  <p id="confirmMsg">Eliminare il post-it?</p>
  <div class="pop-row">
    <button class="pop-btn" id="confirmNo" type="button">Annulla</button>
    <button class="pop-btn danger" id="confirmYes" type="button">Elimina</button>
  </div>
</div>

<script>
(()=>{
'use strict';
const $=id=>document.getElementById(id);

const viewport=$('viewport'),board=$('board');
const sketch=$('sketch'),ctx=sketch.getContext('2d');
const notesLayer=$('notesLayer');
const drawer=$('drawer'),hamburger=$('hamburger');
const clockEl=$('clock'),timeLine=$('timeLine'),dateLine=$('dateLine');
const drawToolbar=$('drawToolbar'),textToolbar=$('textToolbar'),noteToolbar=$('noteToolbar');
const textModeBtn=$('textModeBtn'),drawModeBtn=$('drawModeBtn');
const noteModeBtn=$('noteModeBtn'),addNoteBtn=$('addNoteBtn');
const penBtn=$('penBtn'),eraserBtn=$('eraserBtn');
const confirmPop=$('confirmPop'),confirmYes=$('confirmYes'),confirmNo=$('confirmNo');
const confirmMsg=$('confirmMsg');

const NOTE_COLORS=['yellow','pink','blue','green','lilac','orange','mint'];
const NOTE_COLOR_MAP={yellow:'#f5e36d',pink:'#f6bfd0',blue:'#bfe0f6',green:'#cbe8be',
  lilac:'#dcccf7',orange:'#ffd3a1',mint:'#bfeedc'};
const PEN_COLORS=['#1f2328','#0f6f76','#d94848','#2563eb','#16a34a','#9333ea','#ea580c','#ffffff'];
const TEXT_COLORS=['#1f2328','#d94848','#0f6f76','#2563eb','#16a34a','#9333ea','#7c3f00'];
const PRESETS=[
  {label:'🖥️',title:'Desktop 1920×1080',w:1920,h:1080},
  {label:'💻',title:'Laptop 1366×768',w:1366,h:768},
  {label:'📺',title:'Full HD 1280×720',w:1280,h:720},
  {label:'📟',title:'Tablet 768×1024',w:768,h:1024},
  {label:'📱',title:'Mobile 390×844',w:390,h:844},
];
const PEN_MIN=1,PEN_MAX=40,ERASER_MIN=8,ERASER_MAX=100,FONT_MIN=10,FONT_MAX=36;
const KEY='board-lite-v10';

function uid(){return crypto.randomUUID();}
function clone(o){return JSON.parse(JSON.stringify(o));}
function fmtTime(){return new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});}
function fmtDate(){return new Date().toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'short'});}
function mkBoard(opts={}){
  return {id:uid(),name:'Board',width:1366,height:768,panX:0,panY:0,
    notes:[],strokes:[],visibility:'private',...opts};
}

// ── State init (with migration from v1 flat format) ───────
const DEF={
  showClock:true,drawMode:false,textMode:false,noteMode:false,
  noteColor:'yellow',penColor:'#1f2328',penSize:7,eraser:false,eraserSize:28,
  activeBoardId:null,boards:[]
};
let raw={};
try{raw=JSON.parse(localStorage.getItem(KEY)||'{}');}catch{}

// Migrate old flat format (notes/strokes at top level)
if(!raw.boards&&raw.notes){
  const b=mkBoard({width:raw.boardW||1366,height:raw.boardH||768,
    panX:raw.panX||0,panY:raw.panY||0,notes:raw.notes||[],strokes:raw.strokes||[]});
  raw={...raw,boards:[b],activeBoardId:b.id};
}

let state={...DEF,...raw};
// Ensure at least one board
if(!state.boards||!state.boards.length){const b=mkBoard();state.boards=[b];state.activeBoardId=b.id;}
if(!state.boards.find(b=>b.id===state.activeBoardId))state.activeBoardId=state.boards[0].id;

// Promote active board into flat state (for backward-compat with existing functions)
{const ab=state.boards.find(b=>b.id===state.activeBoardId);
 state.boardW=ab.width;state.boardH=ab.height;
 state.panX=ab.panX||0;state.panY=ab.panY||0;
 state.notes=ab.notes||[];state.strokes=ab.strokes||[];}

// ── Active board sync ─────────────────────────────────────
function syncActiveBoard(){
  const b=state.boards.find(b=>b.id===state.activeBoardId);
  if(!b)return;
  b.width=state.boardW;b.height=state.boardH;
  b.panX=state.panX;b.panY=state.panY;
  b.notes=state.notes;b.strokes=state.strokes;
}
function loadBoardIntoState(b){
  state.boardW=b.width||1366;state.boardH=b.height||768;
  state.panX=b.panX||0;state.panY=b.panY||0;
  state.notes=b.notes||[];state.strokes=b.strokes||[];
  document.title=b.name||'Board';
}

// ── Save ─────────────────────────────────────────────────
function save(){
  if(isViewMode)return;
  syncActiveBoard();
  const isUser=!!(window._boardApp?.currentUser);
  if(!isUser){
    try{localStorage.setItem(KEY,JSON.stringify(state));}catch{}
  }else{
    // Persist only UI prefs locally when logged in
    const prefs={showClock:state.showClock,noteColor:state.noteColor,
      penColor:state.penColor,penSize:state.penSize,eraser:state.eraser,eraserSize:state.eraserSize,
      drawMode:state.drawMode,textMode:state.textMode,noteMode:state.noteMode,
      activeBoardId:state.activeBoardId};
    try{localStorage.setItem(KEY+'-prefs',JSON.stringify(prefs));}catch{}
    window._boardApp?.scheduleSbSave?.();
  }
}

let drag=null,resizing=null,drawing=false,boardStroke=null,rt=null;
let activeNote=null,pendingDelete=null;
let panning=false,panStart=null,panOrigin=null,panTimer=null;
let isViewMode=false;

// ── VIEW MODE ─────────────────────────────────────────────
function enterViewMode(board){
  isViewMode=true;
  // Load board data
  state.boardW=board.width||1366;state.boardH=board.height||768;
  state.panX=0;state.panY=0;
  state.notes=board.notes||[];state.strokes=board.strokes||[];
  board.style&&board.style; // noop (board is data, not DOM)
  applyBoardSize(board.width||1366,board.height||768);
  // Hide all editing UI
  document.querySelector('.corner').style.cssText='display:none!important';
  // Show view banner
  const nm=$('viewBoardName');if(nm)nm.textContent=board.name||'Board';
  $('viewBanner')?.classList.add('on');
  document.title=(board.name||'Board')+' · Board';
  // Ensure canvases / notes are truly non-interactive
  sketch.style.pointerEvents='none';
  notesLayer.querySelectorAll('textarea').forEach(t=>{t.readOnly=true;t.style.pointerEvents='none';});
  notesLayer.querySelectorAll('.note-canvas').forEach(nc=>{nc.style.pointerEvents='none';});
  notesLayer.querySelectorAll('.note-head').forEach(h=>{h.style.pointerEvents='none';});
  notesLayer.querySelectorAll('.resize-handle').forEach(r=>{r.style.pointerEvents='none';});
}
function exitViewMode(){
  isViewMode=false;
  document.querySelector('.corner').style.cssText='';
  $('viewBanner')?.classList.remove('on');
  sketch.style.pointerEvents='';
  // Restore interactivity on all note sub-elements
  notesLayer.querySelectorAll('textarea').forEach(t=>{t.readOnly=false;t.style.pointerEvents='';});
  notesLayer.querySelectorAll('.note-canvas').forEach(nc=>{nc.style.pointerEvents='';});
  notesLayer.querySelectorAll('.note-head').forEach(h=>{h.style.pointerEvents='';});
  notesLayer.querySelectorAll('.resize-handle').forEach(r=>{r.style.pointerEvents='';});
}

$('viewExitBtn')?.addEventListener('click',()=>{
  window._boardApp?.stopVisibilityWatcher?.();
  window.location.href=location.origin+location.pathname;
});

// ── CLOCK ────────────────────────────────────────────────
function updateClock(){
  timeLine.textContent=fmtTime();dateLine.textContent=fmtDate();
  clockEl.classList.toggle('hidden',!state.showClock);
}
setInterval(()=>{if(state.showClock)updateClock();},30000);

// ── BOARD SIZE & PAN ─────────────────────────────────────
function clampPan(){
  const vw=window.innerWidth,vh=window.innerHeight;
  const minX=Math.min(0,vw-state.boardW),minY=Math.min(0,vh-state.boardH);
  state.panX=Math.max(minX,Math.min(0,state.panX));
  state.panY=Math.max(minY,Math.min(0,state.panY));
}
function applyPan(){board.style.transform=`translate(${state.panX}px,${state.panY}px)`;}
function applyBoardSize(w,h){
  state.boardW=w;state.boardH=h;
  board.style.width=w+'px';board.style.height=h+'px';
  const dpr=window.devicePixelRatio||1;
  sketch.width=Math.round(w*dpr);sketch.height=Math.round(h*dpr);
  sketch.style.width=w+'px';sketch.style.height=h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  state.notes.forEach(n=>{
    n.x=Math.max(4,Math.min(w-n.w-4,n.x));
    n.y=Math.max(4,Math.min(h-n.h-4,n.y));
  });
  clampPan();applyPan();renderNotes();redrawBoard();
}
function centerBoard(){
  const vw=window.innerWidth,vh=window.innerHeight;
  state.panX=Math.min(0,Math.round((vw-state.boardW)/2));
  state.panY=Math.min(0,Math.round((vh-state.boardH)/2));
  clampPan();applyPan();save();
}
function showPanInd(){
  panInd.textContent=`${-Math.round(state.panX)},${-Math.round(state.panY)}`;
  panInd.classList.add('show');
  clearTimeout(panTimer);panTimer=setTimeout(()=>panInd.classList.remove('show'),1200);
}

// ── BOARD LIST ───────────────────────────────────────────
function renderBoardList(){
  const listEl=$('boardsList'),newBtn=$('newBoardBtn');
  if(!listEl)return;
  const isUser=!!(window._boardApp?.currentUser);
  if(newBtn)newBtn.style.display=isUser?'grid':'none';

  listEl.innerHTML='';

  if(!isUser){
    // Guest: show local board as read-only item
    const b=state.boards.find(b=>b.id===state.activeBoardId)||state.boards[0];
    if(b){
      const item=document.createElement('div');
      item.className='d-board local active';
      const dot=document.createElement('div');dot.className='d-dot';
      const name=document.createElement('span');
      name.className='d-bname';name.textContent=b.name;name.title=b.name;
      item.append(dot,name);
      listEl.appendChild(item);
    }
    return;
  }

  // Visibility config: icon, label, next state in cycle
  const VIS={
    private:{icon:'🔒',title:'Private',next:'public'},
    public: {icon:'🌐',title:'Public',next:'cooperative'},
    cooperative:{icon:'👥',title:'Cooperative',next:'private'},
  };

  const sharedSec=$('sharedSec');
  const sharedListEl=$('sharedList');
  if(sharedListEl)sharedListEl.innerHTML='';

  function mkbib(icon,cls,ttl,cb){
    const btn=document.createElement('button');
    btn.type='button';btn.className='d-bib '+cls;btn.title=ttl;btn.textContent=icon;
    btn.addEventListener('click',e=>{e.stopPropagation();cb(btn);});
    return btn;
  }

  let sharedCount=0;
  const ownedBoards=state.boards.filter(b=>{
    if(!b.visibility)b.visibility='private';
    return !b.ownerId||b.ownerId===(window._boardApp?.currentUser?.id);
  });

  state.boards.forEach(b=>{
    if(!b.visibility)b.visibility='private';
    const isActive=b.id===state.activeBoardId;
    const vis=b.visibility||'private';
    const vc=VIS[vis]||VIS.private;
    const isOwner=!b.ownerId||b.ownerId===(window._boardApp?.currentUser?.id);

    const item=document.createElement('div');
    item.className='d-board'+(isActive?' active':'');
    item.addEventListener('click',()=>switchBoard(b.id));

    const dot=document.createElement('div');dot.className='d-dot';
    const name=document.createElement('span');
    name.className='d-bname';name.textContent=b.name;name.title=b.name;

    if(isOwner){
      // Visibility badge — clickable, cycles through states
      const visBtn=document.createElement('button');
      visBtn.type='button';
      visBtn.className='vis-btn'+(vis!=='private'?' pub':'');
      visBtn.textContent=vc.icon;
      visBtn.title=vc.title+' — click to change';
      visBtn.addEventListener('click',e=>{
        e.stopPropagation();
        b.visibility=vc.next;
        if(vc.next==='cooperative'&&b.id!==state.activeBoardId){
          syncActiveBoard();
          state.activeBoardId=b.id;
          loadBoardIntoState(b);
          applyBoardSize(b.width,b.height);
        }
        save();
        window._boardApp?.sbUpdateVisibility?.(b.id,vc.next);
        renderBoardList();
        const app=window._boardApp;
        if(vc.next==='public'||vc.next==='cooperative'){
          app?.joinPresenceChannel?.(b.id);
        } else {
          app?.leavePresenceChannel?.();
        }
      });

      const acts=document.createElement('div');acts.className='d-acts';
      acts.append(
        mkbib('✏️','','Rename',()=>startRenameBoard(b,name)),
        mkbib('⧉','','Duplicate',()=>dupBoard(b)),
        ...(ownedBoards.length>1?[mkbib('✕','del','Delete',btn=>confirmDeleteBoard(b.id,btn))]:[])
      );

      item.append(dot,name,visBtn,acts);
      listEl.appendChild(item);

      // Share link row for public + cooperative
      if(vis==='public'||vis==='cooperative'){
        const shareRow=document.createElement('div');
        shareRow.className='d-share-row';
        const copyBtn=document.createElement('button');
        copyBtn.type='button';copyBtn.className='d-copy-btn';
        copyBtn.title='Copy share link';copyBtn.innerHTML='🔗';
        let ct=null;
        copyBtn.addEventListener('click',e=>{
          e.stopPropagation();
          const link=`${location.origin}${location.pathname}?board=${b.id}`;
          navigator.clipboard.writeText(link).then(()=>{
            copyBtn.innerHTML='✓';copyBtn.classList.add('copied');
            clearTimeout(ct);ct=setTimeout(()=>{copyBtn.innerHTML='🔗';copyBtn.classList.remove('copied');},2000);
          }).catch(()=>prompt('Share link:',link));
        });
        shareRow.appendChild(copyBtn);
        listEl.appendChild(shareRow);
      }
    } else {
      // Shared board — goes in "Condivise con me" section
      sharedCount++;
      const icon=document.createElement('span');
      icon.className='vis-btn pub';icon.textContent='👥';
      icon.title='Condivisa da qualcun altro';
      icon.style.pointerEvents='none';
      item.append(dot,name,icon);
      if(sharedListEl)sharedListEl.appendChild(item);
    }
  });

  if(sharedSec)sharedSec.style.display=sharedCount>0?'':'none';

  // Members panel for cooperative board owner
  renderMembersSection(null);
  if(window._boardApp?.currentUser){
    const ab=state.boards.find(b=>b.id===state.activeBoardId);
    if(ab?.visibility==='cooperative'&&(!ab.ownerId||ab.ownerId===window._boardApp?.currentUser?.id)){
      window._boardApp?.refreshMembers?.(ab.id);
    }
  }
}

function confirmDeleteBoard(boardId,anchorEl){
  const b=state.boards.find(bd=>bd.id===boardId);
  showConfirm(anchorEl,()=>execDeleteBoard(boardId),`Delete "${b?.name||'board'}"?`);
}

function startRenameBoard(board,nameEl){
  const orig=board.name;
  const inp=document.createElement('input');
  inp.className='d-binp';inp.value=orig;
  nameEl.replaceWith(inp);inp.focus();inp.select();
  const done=()=>{
    board.name=inp.value.trim()||orig;
    nameEl.textContent=board.name;nameEl.title=board.name;
    inp.replaceWith(nameEl);
    if(board.id===state.activeBoardId)document.title=board.name;
    save();window._boardApp?.sbUpdateBoardName?.(board.id,board.name);
  };
  inp.addEventListener('blur',done);
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter')inp.blur();
    if(e.key==='Escape'){inp.value=orig;inp.blur();}
  });
}

function switchBoard(id){
  if(id===state.activeBoardId){openDrawer(false);return;}
  if(activeNote)deactivateNote();
  syncActiveBoard();
  state.activeBoardId=id;
  const b=state.boards.find(b=>b.id===id);
  loadBoardIntoState(b);
  applyBoardSize(b.width,b.height); // calls renderNotes + redrawBoard
  renderBoardList();
  openDrawer(false);
  save();
  // Presence: leave old channel, join new if board is shared
  const app=window._boardApp;
  if(b.visibility==='public'||b.visibility==='cooperative'){
    app?.joinPresenceChannel?.(b.id);
  } else {
    app?.leavePresenceChannel?.();
  }
}

function newBoard(){
  if(activeNote)deactivateNote();
  syncActiveBoard();
  const b=mkBoard();
  state.boards.push(b);
  state.activeBoardId=b.id;
  loadBoardIntoState(b);
  applyBoardSize(b.width,b.height);
  renderBoardList();
  save();
  window._boardApp?.sbCreateBoard?.(b);
}

function dupBoard(board){
  syncActiveBoard(); // always flush active board before cloning any board
  const dup=clone(board);
  dup.id=uid();
  dup.notes=dup.notes.map(n=>({...n,id:uid()}));
  state.boards.push(dup);
  renderBoardList();

function execDeleteBoard(boardId){
  const idx=state.boards.findIndex(b=>b.id===boardId);
  if(idx<0)return;
  state.boards.splice(idx,1);
  if(state.activeBoardId===boardId){
    if(activeNote)deactivateNote();
    const nb=state.boards[Math.min(idx,state.boards.length-1)];
    state.activeBoardId=nb.id;
    loadBoardIntoState(nb);
    applyBoardSize(nb.width,nb.height);
  }
  renderBoardList();save();
  window._boardApp?.sbDeleteBoard?.(boardId);
}

// ── VERTICAL SLIDER ──────────────────────────────────────
function makeVSlider({trackEl,fillEl,thumbEl,valEl,min,max,getValue,setValue,onUpdate}){
  function pct(){return Math.max(0,Math.min(1,(getValue()-min)/(max-min)));}
  function render(){
    const p=pct();
    fillEl.style.height=(p*100)+'%';
    thumbEl.style.bottom=(p*100)+'%';
    valEl.textContent=Math.round(getValue());
  }
  function setFromY(e,rect){
    const y=Math.min(Math.max(0,e.clientY-rect.top),rect.height);
    setValue(Math.max(min,Math.min(max,Math.round(max-(y/rect.height)*(max-min)))));
    onUpdate();render();
  }
  let dr=false,rc=null;
  trackEl.addEventListener('pointerdown',e=>{
    dr=true;rc=trackEl.getBoundingClientRect();
    trackEl.setPointerCapture(e.pointerId);setFromY(e,rc);e.stopPropagation();
  });
  trackEl.addEventListener('pointermove',e=>{if(dr)setFromY(e,rc);});
  trackEl.addEventListener('pointerup',()=>{dr=false;save();});
  render();return render;
}

// ── BOARD CANVAS ─────────────────────────────────────────
function initSketchCanvas(){
  const dpr=window.devicePixelRatio||1;
  sketch.width=Math.round(state.boardW*dpr);
  sketch.height=Math.round(state.boardH*dpr);
  sketch.style.width=state.boardW+'px';
  sketch.style.height=state.boardH+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
function redrawBoard(){
  ctx.clearRect(0,0,state.boardW,state.boardH);
  ctx.lineCap='round';ctx.lineJoin='round';
  (state.strokes||[]).forEach(s=>{
    if(!s.points||s.points.length<2)return;
    ctx.globalCompositeOperation=s.eraser?'destination-out':'source-over';
    ctx.strokeStyle=s.eraser?'rgba(0,0,0,1)':(s.color||'#1f2328');
    ctx.lineWidth=s.size||7;
    ctx.beginPath();ctx.moveTo(s.points[0].x,s.points[0].y);
    s.points.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));ctx.stroke();
  });
  ctx.globalCompositeOperation='source-over';
  // Re-draw any in-progress remote strokes so they survive clearRect
  window._boardApp?.onAfterRedrawBoard?.();
}
function sketchPos(e){
  const r=sketch.getBoundingClientRect();
  return{x:e.clientX-r.left,y:e.clientY-r.top};
}
sketch.addEventListener('pointerdown',e=>{
  if(!state.drawMode)return;
  drawing=true;sketch.setPointerCapture(e.pointerId);
  boardStroke={_id:uid(),points:[sketchPos(e)],color:state.penColor,
    size:state.eraser?state.eraserSize:state.penSize,eraser:state.eraser};
  state.strokes.push(boardStroke);redrawBoard();
});
sketch.addEventListener('pointermove',e=>{
  if(!drawing||!boardStroke)return;
  const pt=sketchPos(e);boardStroke.points.push(pt);redrawBoard();
  window._boardApp?.broadcastStrokePt?.({
    strokeId:boardStroke._id,type:'board',x:pt.x,y:pt.y,
    color:boardStroke.color,size:boardStroke.size,eraser:boardStroke.eraser});
});
window.addEventListener('pointerup',()=>{
  if(drawing){
    drawing=false;
    if(boardStroke)window._boardApp?.broadcastStrokeEnd?.({strokeId:boardStroke._id,type:'board'});
    boardStroke=null;save();
  }
});

// ── NOTES ────────────────────────────────────────────────
function renderNotes(){
  notesLayer.innerHTML='';
  state.notes.forEach(n=>notesLayer.appendChild(makeNote(n)));
}
function resizeNoteCanvas(nc,note){
  const dpr=window.devicePixelRatio||1;
  const ch=note.h-34;
  nc.width=Math.round(note.w*dpr);nc.height=Math.round(ch*dpr);
  nc.style.width=note.w+'px';nc.style.height=ch+'px';
  const c=nc.getContext('2d');c.setTransform(dpr,0,0,dpr,0,0);
  redrawNoteCanvas(nc,note);
}
function redrawNoteCanvas(nc,note){
  const c=nc.getContext('2d');
  c.clearRect(0,0,note.w,note.h);
  c.lineCap='round';c.lineJoin='round';
  (note.noteStrokes||[]).forEach(s=>{
    if(!s.points||s.points.length<2)return;
    c.globalCompositeOperation=s.eraser?'destination-out':'source-over';
    c.strokeStyle=s.eraser?'rgba(0,0,0,1)':(s.color||'#1f2328');
    c.lineWidth=s.size||7;
    c.beginPath();c.moveTo(s.points[0].x,s.points[0].y);
    s.points.slice(1).forEach(p=>c.lineTo(p.x,p.y));c.stroke();
  });
  c.globalCompositeOperation='source-over';
}
function makeNote(note){
  if(!note.w)note.w=210;if(!note.h)note.h=180;
  if(!note.textColor)note.textColor='#1f2328';if(!note.fontSize)note.fontSize=15;
  if(!note.noteStrokes)note.noteStrokes=[];
  const el=document.createElement('article');
  el.className='note';el.dataset.id=note.id;
  el.style.cssText=`left:${note.x}px;top:${note.y}px;width:${note.w}px;height:${note.h}px;`;
  el.style.setProperty('--rot',(note.rot||0)+'deg');
  el.style.background=NOTE_COLOR_MAP[note.color]||NOTE_COLOR_MAP.yellow;
  el.innerHTML=`
    <div class="note-head">
      <button class="mini-btn" data-action="dup" tabindex="-1" type="button">＋</button>
      <button class="mini-btn" data-action="del" tabindex="-1" type="button">×</button>
    </div>
    <textarea spellcheck="false" readonly></textarea>
    <canvas class="note-canvas"></canvas>
    <div class="resize-handle" data-resize></div>
  `;
  const ta=el.querySelector('textarea');
  const nc=el.querySelector('canvas.note-canvas');
  ta.value=note.text;ta.style.color=note.textColor;ta.style.fontSize=note.fontSize+'px';
  ta.addEventListener('input',()=>{note.text=ta.value;note.updatedAt=Date.now();save();
    window._boardApp?.broadcastNoteText?.(note.id,note.text,note.updatedAt);});

  el.addEventListener('click',e=>{
    if(!state.textMode)return;
    if(e.target.closest('[data-action]')||e.target.closest('[data-resize]')||
       e.target.closest('.note-canvas')||e.target.closest('.note-head'))return;
    activateNote(note,el);
  });
  el.querySelector('[data-action="del"]').addEventListener('click',e=>{
    e.stopPropagation();
    showConfirm(e.currentTarget,()=>{
      const delId=note.id;
      state.notes=state.notes.filter(n=>n.id!==delId);
      if(activeNote&&activeNote.note.id===delId)deactivateNote();
      renderNotes();save();
      window._boardApp?.broadcastNoteDelete?.(delId);
    });
  });
  el.querySelector('[data-action="dup"]').addEventListener('click',e=>{
    e.stopPropagation();
    const dup={...clone(note),id:uid(),
      x:Math.min(state.boardW-note.w-4,note.x+20),
      y:Math.min(state.boardH-note.h-4,note.y+20),
      noteStrokes:clone(note.noteStrokes||[]),updatedAt:Date.now()};
    state.notes.push(dup);renderNotes();save();
    window._boardApp?.broadcastNoteCreate?.(dup);
  });

  const head=el.querySelector('.note-head');
  head.addEventListener('pointerdown',e=>{
    if(e.target.closest('[data-action]'))return;
    drag={id:note.id,ox:e.clientX-note.x-state.panX,oy:e.clientY-note.y-state.panY};
    el.classList.add('dragging');el.setPointerCapture(e.pointerId);e.stopPropagation();
  });
  el.addEventListener('pointermove',e=>{
    if(drag&&drag.id===note.id){
      note.x=Math.max(4,Math.min(state.boardW-note.w-4,e.clientX-state.panX-drag.ox));
      note.y=Math.max(4,Math.min(state.boardH-note.h-4,e.clientY-state.panY-drag.oy));
      el.style.left=note.x+'px';el.style.top=note.y+'px';
      note.updatedAt=Date.now();
      window._boardApp?.broadcastNoteUpdate?.(note.id,note.x,note.y,note.w,note.h,note.updatedAt);
    }
    if(resizing&&resizing.id===note.id){
      note.w=Math.max(120,Math.min(state.boardW-note.x-4,resizing.sw+(e.clientX-resizing.sx)));
      note.h=Math.max(100,Math.min(state.boardH-note.y-4,resizing.sh+(e.clientY-resizing.sy)));
      el.style.width=note.w+'px';el.style.height=note.h+'px';
      resizeNoteCanvas(nc,note);
      note.updatedAt=Date.now();
      window._boardApp?.broadcastNoteUpdate?.(note.id,note.x,note.y,note.w,note.h,note.updatedAt);
    }
  });
  el.addEventListener('pointerup',()=>{
    if(drag&&drag.id===note.id){drag=null;el.classList.remove('dragging');save();}
    if(resizing&&resizing.id===note.id){resizing=null;save();}
  });

  const rh=el.querySelector('[data-resize]');
  rh.addEventListener('pointerdown',e=>{
    e.stopPropagation();
    resizing={id:note.id,sx:e.clientX,sy:e.clientY,sw:note.w,sh:note.h};
    el.setPointerCapture(e.pointerId);
  });
  rh.addEventListener('click',e=>e.stopPropagation());

  resizeNoteCanvas(nc,note);
  let nd=false,ns=null;
  function np(e){const r=nc.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
  nc.addEventListener('pointerdown',e=>{
    if(!state.drawMode)return;
    nd=true;nc.setPointerCapture(e.pointerId);
    ns={_id:uid(),points:[np(e)],color:state.penColor,
      size:state.eraser?state.eraserSize:state.penSize,eraser:state.eraser};
    note.noteStrokes.push(ns);redrawNoteCanvas(nc,note);e.stopPropagation();
  });
  nc.addEventListener('pointermove',e=>{
    if(!nd||!ns)return;
    const pt=np(e);ns.points.push(pt);redrawNoteCanvas(nc,note);
    window._boardApp?.broadcastStrokePt?.({
      strokeId:ns._id,type:'note',noteId:note.id,x:pt.x,y:pt.y,
      color:ns.color,size:ns.size,eraser:ns.eraser});
  });
  nc.addEventListener('pointerup',()=>{
    if(nd){
      nd=false;
      if(ns)window._boardApp?.broadcastStrokeEnd?.({strokeId:ns._id,type:'note',noteId:note.id});
      ns=null;save();
    }
  });
  nc.addEventListener('pointercancel',()=>{nd=false;ns=null;});
  if(state.drawMode&&!state.eraser)nc.classList.add('draw-on');
  if(state.drawMode&&state.eraser)nc.classList.add('eraser-on');
  return el;
}

async function loadPublicBoard(boardId) {
  const app = window._boardApp;
  try {
    const client = await getClient();
    const { data: meta, error } = await client
      .from('boards').select('*').eq('id', boardId).single();

    // RLS denies access when board is private or doesn't exist:
    // anon users can only SELECT boards WHERE visibility='public' (policy 002).
    // So if meta is null here, the board was set back to private → deny silently.
    if (error || !meta) {
      // Strip ?board= from URL so the user doesn't keep a dead link in their address bar
      history.replaceState(null, '', location.pathname);
      return; // show normal guest app
    }
    // Extra defence: should never reach here for private boards due to RLS,
    // but guards against future policy changes or unexpected states.
    if (meta.visibility !== 'public') {
      history.replaceState(null, '', location.pathname);
      return;
    }

    const [{ data: notes }, { data: strokes }] = await Promise.all([
      client.from('notes').select('id,data').eq('board_id', boardId),
      client.from('strokes').select('data').eq('board_id', boardId).limit(1),
    ]);

    const board = {
      id: meta.id, name: meta.name,
      width: meta.width || 1366, height: meta.height || 768,
      panX: 0, panY: 0,
      notes: (notes || []).map(r => r.data),
      strokes: strokes?.length ? (strokes[0].data || []) : [],
      visibility: meta.visibility,
    };

    if (app?.enterViewMode) app.enterViewMode(board);
    // Watcher: evict viewer if board is set back to private
    startVisibilityWatcher(boardId);
    if (app) app.stopVisibilityWatcher = stopVisibilityWatcher;
  } catch (err) {
    console.warn('loadPublicBoard:', err.message);
    history.replaceState(null, '', location.pathname);
    return;
  }
  // Presence is non-critical — failure must NOT strip the ?board= URL
  // or hide the board. Join after the critical path completes.
  try {
    await joinPresenceChannel(boardId);
  } catch (err) {
    console.warn('joinPresenceChannel (non-critical):', err.message);
  }
}

// ── Visibility watcher (view mode only) ──────────────────
let _visWatcher = null;

function startVisibilityWatcher(boardId) {
  stopVisibilityWatcher();
  _visWatcher = setInterval(async () => {
    const app = window._boardApp;
    // Auto-stop if we left view mode some other way
    if (!app?.isViewMode) { stopVisibilityWatcher(); return; }
    try {
      const client = await getClient();
      // Anon SELECT: succeeds only if visibility is still 'public' (RLS 002).
      // If it returns null the board was set to private → evict immediately.
      const { data } = await client
        .from('boards').select('visibility').eq('id', boardId).maybeSingle();
      if (!data || data.visibility !== 'public') {
        stopVisibilityWatcher();
        // Wipe the view and exit
        app.exitViewMode();
        app.state.notes   = [];
        app.state.strokes = [];
        app.renderNotes?.();
        app.redrawBoard?.();
        history.replaceState(null, '', location.pathname);
      }
    } catch { /* network error — keep trying */ }
  }, 12000); // check every 12 s
}

function stopVisibilityWatcher() {
  if (_visWatcher) { clearInterval(_visWatcher); _visWatcher = null; }
}

// ── Presence (F5) ─────────────────────────────────────────
// 10 distinct pastel-ish colours, assigned deterministically by userId hash
const PRESENCE_COLORS = [
  '#e05c5c','#e07a3a','#c8a020','#4fa84f','#3a9e8a',
  '#3a7ec8','#6a5bd4','#b04db0','#c04070','#5a8f6a',
];
function presenceColor(userId) {
  let h = 0;
  for (let i = 0; i < userId.length; i++) h = (Math.imul(31, h) + userId.charCodeAt(i)) | 0;
  return PRESENCE_COLORS[Math.abs(h) % PRESENCE_COLORS.length];
}
function presenceInitials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  return parts.length >= 2
    ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
    : name.slice(0, 2).toUpperCase();
}

let _presenceChannel = null;

function renderPresenceStack(peers) {
  const stack = document.getElementById('presenceStack');
  if (!stack) return;
  stack.innerHTML = '';
  if (!peers.length) { stack.classList.add('hidden'); return; }
  stack.classList.remove('hidden');

  const MAX = 5;
  const visible = peers.slice(0, MAX);
  const extra   = peers.length - MAX;

  // "+N" overflow pill (rendered first → appears rightmost due to row-reverse)
  if (extra > 0) {
    const pill = document.createElement('div');
    pill.className = 'pav pav-more';
    pill.textContent = '+' + extra;
    pill.title = extra + ' more online';
    stack.appendChild(pill);
  }
  // Individual avatars (reversed so first peer is rightmost)
  [...visible].reverse().forEach(p => {
    const av = document.createElement('div');
    av.className = 'pav';
    av.style.background = presenceColor(p.userId);
    av.textContent = presenceInitials(p.name);
    av.title = p.name || p.email || 'Anonymous';
    stack.appendChild(av);
  });
}

// ── Cursor layer (F6) ────────────────────────────────────
const _remoteCursors = new Map(); // userId → { el, timer }

function _cursorSvg(color) {
  return `<svg width="14" height="18" viewBox="0 0 14 18" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M1 1 L1 13.5 L4.5 10 L7 16.5 L9 15.5 L6.5 9 L11 9 Z"
          fill="${color}" stroke="rgba(255,255,255,.85)" stroke-width="1.2" stroke-linejoin="round"/>
  </svg>`;
}

function upsertRemoteCursor(userId, x, y, name, color) {
  const layer = document.getElementById('cursorsLayer');
  if (!layer) return;
  let entry = _remoteCursors.get(userId);
  if (!entry) {
    const el = document.createElement('div');
    el.className = 'remote-cursor';
    el.innerHTML = _cursorSvg(color) +
      `<span class="cursor-label" style="background:${color}">${name}</span>`;
    layer.appendChild(el);
    entry = { el, timer: null };
    _remoteCursors.set(userId, entry);
  }
  entry.el.style.left = x + 'px';
  entry.el.style.top  = y + 'px';
  entry.el.classList.remove('fading');
  // Auto-fade after 3 s of no movement
  clearTimeout(entry.timer);
  entry.timer = setTimeout(() => entry.el.classList.add('fading'), 3000);
}

function removeRemoteCursor(userId) {
  const entry = _remoteCursors.get(userId);
  if (entry) { entry.el.remove(); clearTimeout(entry.timer); }
  _remoteCursors.delete(userId);
}

function clearAllCursors() {
  _remoteCursors.forEach((_, id) => removeRemoteCursor(id));
}

// Throttled cursor sender — max 30 fps
let _lastCursorSend = 0;
const _CURSOR_MS = 33;
// Stable anon key so guest cursors stay consistent within a session
const _anonKey = 'anon-' + Math.random().toString(36).slice(2);
// My display name — set when joining presence channel
let _myPresenceName = 'Guest';

function sendCursor(clientX, clientY) {
  if (!_presenceChannel || document.hidden) return;
  const now = Date.now();
  if (now - _lastCursorSend < _CURSOR_MS) return;
  _lastCursorSend = now;
  const app = window._boardApp;
  if (!app) return;
  const bx = Math.round(clientX - (app.state.panX || 0));
  const by = Math.round(clientY - (app.state.panY || 0));
  _presenceChannel.send({ type: 'broadcast', event: 'cursor',
    payload: { userId: currentUser?.id ?? _anonKey, x: bx, y: by, name: _myPresenceName } });
}

// Global pointermove → send cursor (only active when channel is open)
document.addEventListener('pointermove', e => sendCursor(e.clientX, e.clientY), { passive: true });

async function joinPresenceChannel(boardId) {
  await leavePresenceChannel();
  if (!boardId) return;

  const client = await getClient();
  const app    = window._boardApp;
  const user   = currentUser;

  const meta  = user?.user_metadata ?? {};
  const name  = meta.full_name ?? meta.name ?? user?.email?.split('@')[0] ?? 'Guest';
  _myPresenceName = name;
  const myKey = user?.id ?? _anonKey;
  const color = presenceColor(myKey);

  _presenceChannel = client.channel('board:' + boardId, {
    config: { presence: { key: myKey } },
  });

  _presenceChannel
    // ── Presence sync → avatar stack ──────────────────────
    .on('presence', { event: 'sync' }, () => {
      const ps = _presenceChannel.presenceState();
      const peers = Object.entries(ps)
        .map(([, payloads]) => payloads[0])
        .filter(p => p && p.userId !== myKey);
      renderPresenceStack(peers);
      // Remove cursors for users no longer present
      const liveIds = new Set(peers.map(p => p.userId).filter(Boolean));
      _remoteCursors.forEach((_, uid) => { if (!liveIds.has(uid)) removeRemoteCursor(uid); });
    })
    // ── Cursor broadcast → remote cursor layer ────────────
    .on('broadcast', { event: 'cursor' }, ({ payload }) => {
      if (!payload || payload.userId === myKey) return;
      // Name comes directly from the payload (set at broadcast time).
      // Fall back to presence state in case this is an older client.
      const ps = _presenceChannel.presenceState();
      const peerPayload = Object.values(ps).flat().find(p => p.userId === payload.userId);
      const peerName  = payload.name ?? peerPayload?.name ?? 'Guest';
      const peerColor = presenceColor(payload.userId);
      upsertRemoteCursor(payload.userId, payload.x, payload.y, peerName, peerColor);
    })
    // ── Note sync ─────────────────────────────────────────
    .on('broadcast', { event: 'note:update' }, ({ payload }) => {
      if (!payload || payload.userId === myKey) return;
      handleNoteUpdate(payload);
    })
    .on('broadcast', { event: 'note:text' }, ({ payload }) => {
      if (!payload || payload.userId === myKey) return;
      handleNoteText(payload);
    })
    .on('broadcast', { event: 'note:create' }, ({ payload }) => {
      if (!payload || payload.userId === myKey) return;
      handleNoteCreate(payload);
    })
    .on('broadcast', { event: 'note:delete' }, ({ payload }) => {
      if (!payload || payload.userId === myKey) return;
      handleNoteDelete(payload);
    })
    // ── Stroke sync ───────────────────────────────────────
    .on('broadcast', { event: 'stroke:pt' }, ({ payload }) => {
      if (!payload || payload.userId === myKey) return;
      handleStrokePt(payload);
    })
    .on('broadcast', { event: 'stroke:end' }, ({ payload }) => {
      if (!payload || payload.userId === myKey) return;
      handleStrokeEnd(payload);
    })
    .subscribe(async status => {
      if (status === 'SUBSCRIBED') {
        await _presenceChannel.track({ userId: myKey, name, color, boardId, joinedAt: Date.now() });
        installRedrawHook(); // activate after-redraw hook for live remote strokes
      }
    });
}

async function leavePresenceChannel() {
  if (_presenceChannel) {
    try {
      await _presenceChannel.untrack();
      const client = await getClient();
      await client.removeChannel(_presenceChannel);
    } catch { /* ignore */ }
    _presenceChannel = null;
  }
  renderPresenceStack([]);
  clearAllCursors();
  _liveStrokes.clear();
  const app = window._boardApp;
  if (app) app.onAfterRedrawBoard = null;
}

// Hook into redrawBoard so in-progress remote strokes survive clearRect calls
function installRedrawHook() {
  const app = window._boardApp;
  if (!app) return;
  app.onAfterRedrawBoard = () => {
    if (!_liveStrokes.size) return;
    const canvas = document.getElementById('sketch');
    if (!canvas) return;
    const c = canvas.getContext('2d');
    _liveStrokes.forEach(live => {
      if (live.type !== 'board' || live.points.length < 2) return;
      c.lineCap = 'round'; c.lineJoin = 'round';
      c.globalCompositeOperation = live.eraser ? 'destination-out' : 'source-over';
      c.strokeStyle = live.eraser ? 'rgba(0,0,0,1)' : (live.color || '#1f2328');
      c.lineWidth = live.size || 7;
      c.beginPath();
      c.moveTo(live.points[0].x, live.points[0].y);
      for (let i = 1; i < live.points.length; i++) c.lineTo(live.points[i].x, live.points[i].y);
      c.stroke();
      c.globalCompositeOperation = 'source-over';
    });
  };
}

// Clean up on page unload / tab hidden
window.addEventListener('beforeunload', () => leavePresenceChannel());
document.addEventListener('visibilitychange', () => {
  if (document.hidden) leavePresenceChannel();
  else {
    // Rejoin when tab becomes visible again
    const app = window._boardApp;
    const ab  = app?.state?.boards?.find(b => b.id === app.state.activeBoardId);
    if (ab && (ab.visibility === 'public' || ab.visibility === 'cooperative')) {
      joinPresenceChannel(ab.id);
    }
  }
});
