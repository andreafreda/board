<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Whiteboard frame -->
  <rect x="6" y="10" width="52" height="44" rx="7" ry="7"
        fill="#fffaf0" stroke="#0f6f76" stroke-width="3.5"/>
  <!-- Yellow sticky note -->
  <rect x="33" y="20" width="20" height="20" rx="2.5" ry="2.5"
        fill="#f5e36d" stroke="rgba(0,0,0,.15)" stroke-width="1"
        transform="rotate(5 43 30)"/>
  <!-- Two ink strokes on the board -->
  <path d="M14 22 q4 -3 10 0 t10 0" fill="none"
        stroke="#1f2328" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M14 34 l9 0" fill="none"
        stroke="#d94848" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M14 44 l16 0" fill="none"
        stroke="#0f6f76" stroke-width="2.6" stroke-linecap="round"/>
</svg>
